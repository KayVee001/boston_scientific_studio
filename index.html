"PLAIN ENGLISH IS THE FIRST RULE, AND THE MOST IMPORTANT ONE.",

/* =========================================================================
   API call. Direct from the browser using the operator's key.
   ========================================================================= */
async function callClaude({ system, user, model, apiKey, useSearch = false, maxTokens = 4000 }) {
  if (!apiKey) throw new Error("No API key set. Open Settings and paste your Anthropic API key.");
  const headers = {
    "content-type": "application/json",
    "x-api-key": apiKey,
    "anthropic-version": "2023-06-01",
    "anthropic-dangerous-direct-browser-access": "true",
  };
  const body = { model: model || DEFAULT_MODEL, max_tokens: maxTokens, system, messages: [{ role: "user", content: user }] };
  if (useSearch) body.tools = [{ type: "web_search_20250305", name: "web_search" }];

  let res;
  try {
    res = await fetch("https://api.anthropic.com/v1/messages", { method: "POST", headers, body: JSON.stringify(body) });
  } catch (e) {
    throw new Error("Could not reach the API. Check the network and that the key is valid.");
  }
  let data;
  try { data = await res.json(); } catch (e) { throw new Error("The API returned an unreadable response."); }
  if (!res.ok || data.error) {
    const m = (data && data.error && data.error.message) || ("Request failed, status " + res.status);
    if (res.status === 401) throw new Error("The API key was rejected. Check it in Settings.");
    if (res.status === 429) throw new Error("Rate limit reached. Wait a moment and try again.");
    throw new Error(m);
  }
  const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n").trim();
  return text;
}

function extractJSON(text) {
  if (!text) return null;
  let clean = text.replace(/```json/gi, "").replace(/```/g, "").trim();
  try { return JSON.parse(clean); } catch (e) {}
  const s = clean.indexOf("{"), e = clean.lastIndexOf("}");
  if (s !== -1 && e !== -1 && e > s) { try { return JSON.parse(clean.slice(s, e + 1)); } catch (er) {} }
  return null;
}

/* Backstop that enforces the standard even if the model slips */
function sanitize(t) {
  if (!t) return "";
  return String(t)
    .replace(/\u2014/g, ", ").replace(/\u2013/g, "-")
    .replace(/[\u2192\u21d2\u2794\u2799\u279c\u2190\u2191\u2193]/g, " ")
    .replace(/->|=>/g, " ")
    .replace(/[\u2018\u2019]/g, "'").replace(/[\u201c\u201d]/g, '"')
    .replace(/[\u2022\u25aa\u25cf\u2043]/g, "")
    .replace(/[ \t]{2,}/g, " ")
    .replace(/ +\n/g, "\n")
    .trim();
}
const wc = (t) => (t ? String(t).trim().split(/\s+/).filter(Boolean).length : 0);

/* =========================================================================
   App
   ========================================================================= */
function App() {
  const [tab, setTab] = useState("intel");
  const [settings, setSettings] = useState(() => LS.get("fb_settings", { apiKey: "", model: DEFAULT_MODEL, signer: 0 }));
  const [direction, setDirection] = useState(() => LS.get("fb_direction", ""));
  const [intel, setIntel] = useState(() => LS.get("fb_intel", SEED_INTEL));
  const [intelStamp, setIntelStamp] = useState(() => LS.get("fb_intel_stamp", "Baseline. Refresh before using any figure outside."));
  const [contacts, setContacts] = useState(() => LS.get("fb_contacts", []));
  const [approved, setApproved] = useState(() => LS.get("fb_approved", []));
  const [audit, setAudit] = useState(() => LS.get("fb_audit", []));
  const [toast, setToast] = useState("");

  useEffect(() => LS.set("fb_settings", settings), [settings]);
  useEffect(() => LS.set("fb_direction", direction), [direction]);
  useEffect(() => LS.set("fb_intel", intel), [intel]);
  useEffect(() => LS.set("fb_intel_stamp", intelStamp), [intelStamp]);
  useEffect(() => LS.set("fb_contacts", contacts), [contacts]);
  useEffect(() => LS.set("fb_approved", approved), [approved]);
  useEffect(() => LS.set("fb_audit", audit), [audit]);

  const flash = (m) => { setToast(m); setTimeout(() => setToast(""), 2600); };
  const logAudit = (type, detail, sources) =>
    setAudit(prev => [{ time: new Date().toISOString().slice(0, 16).replace("T", " "), type, detail, sources: sources || [] }, ...prev].slice(0, 200));

  const setContact = (id, patch) => setContacts(prev => prev.map(c => c.id === id ? { ...c, ...(typeof patch === "function" ? patch(c) : patch) } : c));

  const intelDigest = () => intel.map(s => s.title + "\n" + s.bullets.map(b => "- " + b.text).join("\n")).join("\n\n");

  /* ---------------- Intelligence refresh ---------------- */
  const [refreshing, setRefreshing] = useState(false);
  const refreshIntel = async () => {
    setRefreshing(true);
    try {
      const system = [
        "You are a MedTech equity and strategy analyst refreshing an account brief on Boston Scientific. Use web search. Cite a real source URL on every figure.",
        "Write each point in plain English, short sentences, no jargon, no em dashes, no arrows, sentence case. A point a non specialist could follow.",
        "Keep the same themes as a working brief: where growth sits and the capacity constraint, where research decisions are made, the deal direction, the structural shifts, and the competitive pressure.",
        "Return only valid JSON, no markdown: {\"stamp\":\"Refreshed, plus the date\",\"sections\":[{\"id\":\"\",\"title\":\"a plain conclusion as the heading\",\"bullets\":[{\"text\":\"\",\"source\":\"https://...\"}]}]}",
      ].join("\n");
      const text = await callClaude({ system, user: "Refresh the Boston Scientific brief now. Today is " + new Date().toDateString() + ".", model: settings.model, apiKey: settings.apiKey, useSearch: true, maxTokens: 6000 });
      const parsed = extractJSON(text);
      if (parsed && parsed.sections && parsed.sections.length) {
        const clean = parsed.sections.map((s, i) => ({ id: s.id || ("s" + i), title: sanitize(s.title), bullets: (s.bullets || []).map(b => ({ text: sanitize(b.text), source: b.source || "" })) }));
        setIntel(clean);
        const stamp = sanitize(parsed.stamp || ("Refreshed " + new Date().toDateString()));
        setIntelStamp(stamp);
        logAudit("Intelligence refresh", "Account brief rebuilt from live sources", clean.flatMap(s => s.bullets.map(b => b.source).filter(Boolean)));
        flash("Intelligence refreshed from live sources.");
      } else flash("Refresh returned an unexpected shape. The baseline is kept.");
    } catch (e) { flash(e.message || "Refresh failed."); }
    finally { setRefreshing(false); }
  };

  /* ---------------- Contact upload ---------------- */
  const fileRef = useRef(null);
  const handleFile = (file) => {
    const finish = (rows) => {
      const mapped = rows.map((r, i) => {
        const get = (...keys) => {
          for (const k of keys) {
            const hit = Object.keys(r).find(c => c.toLowerCase().replace(/[^a-z]/g, "").includes(k));
            if (hit && r[hit]) return String(r[hit]).trim();
          }
          return "";
        };
        const first = get("firstname", "first"), last = get("lastname", "last");
        const name = get("fullname", "name", "contact") || (first + " " + last).trim();
        if (!name) return null;
        let division = get("division", "segment", "businessunit", "function");
        if (!DIVISIONS[division]) division = "Electrophysiology";
        return {
          id: "c_" + Date.now() + "_" + i, name,
          title: get("designation", "title", "role", "jobtitle"),
          division, email: get("email", "mail"), linkedin: get("linkedin", "profile", "url"),
          region: get("region", "location", "country"),
          status: "new", summary: "", signals: [], pains: [], drafts: null,
        };
      }).filter(Boolean);
      if (!mapped.length) { flash("No usable rows found. Check the column headings."); return; }
      setContacts(prev => [...prev, ...mapped]);
      flash(mapped.length + " contacts loaded.");
    };
    const ext = file.name.split(".").pop().toLowerCase();
    if (ext === "csv") Papa.parse(file, { header: true, skipEmptyLines: true, complete: r => finish(r.data) });
    else {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const wb = XLSX.read(new Uint8Array(e.target.result), { type: "array" });
          finish(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" }));
        } catch (er) { flash("Could not read that file."); }
      };
      reader.readAsArrayBuffer(file);
    }
  };

  const addManual = () => {
    setContacts(prev => [...prev, { id: "c_" + Date.now(), name: "", title: "", division: "Electrophysiology", email: "", linkedin: "", region: "", status: "new", summary: "", signals: [], pains: [], drafts: null }]);
  };

  /* ---------------- Verify and research ---------------- */
  const research = async (id) => {
    const c = contacts.find(x => x.id === id); if (!c) return;
    if (!c.name.trim()) { flash("Add a name before researching."); return; }
    setContact(id, { status: "researching" });
    try {
      const system = [
        "You research a single named person for a MedTech advisory firm. Use web search. Be honest about gaps and never invent a quote, a statement or a source.",
        "Step one. Check the person currently holds a role at Boston Scientific. If trusted sources show they have left, stop and report that.",
        "Step two. If current, correct the title and division if the sources show a change.",
        "Step three. Gather public signals from the last six to twelve months, talks, interviews, articles, posts, patents or visible division focus. Paraphrase, never long quotes, with a source and a month.",
        "Step four. From their role and the signals, name and score their three most likely work pressures, one to ten, each with a one line reason.",
        "Write everything in plain English, short sentences, no jargon, no em dashes, no arrows.",
        "Return only valid JSON, no markdown: {\"status\":\"verified|left_company|unclear\",\"corrected_title\":\"\",\"corrected_division\":\"\",\"summary\":\"two or three plain sentences on the person and what their division is driving at\",\"signals\":[{\"text\":\"\",\"source\":\"https://...\",\"date\":\"Mon YYYY\"}],\"pains\":[{\"pain\":\"\",\"score\":8,\"reason\":\"\"}]}",
      ].join("\n");
      const user = ["Person: " + c.name, "Stated title: " + (c.title || "unknown"), "Stated division: " + (c.division || "unknown"), "Company: Boston Scientific", c.linkedin ? "LinkedIn: " + c.linkedin : "", "Today is " + new Date().toDateString() + "."].filter(Boolean).join("\n");
      const text = await callClaude({ system, user, model: settings.model, apiKey: settings.apiKey, useSearch: true, maxTokens: 3500 });
      const p = extractJSON(text) || {};
      const status = p.status === "left_company" ? "left" : p.status === "verified" ? "verified" : "unclear";
      const correctedDiv = p.corrected_division && DIVISIONS[p.corrected_division] ? p.corrected_division : c.division;
      setContact(id, {
        status, title: sanitize(p.corrected_title) || c.title, division: correctedDiv,
        summary: sanitize(p.summary || ""),
        signals: (p.signals || []).map(s => ({ text: sanitize(s.text), source: s.source || "", date: s.date || "" })),
        pains: (p.pains || []).map(x => ({ pain: sanitize(x.pain), score: x.score, reason: sanitize(x.reason || "") })),
      });
      logAudit("Contact research", c.name + ", status " + status, (p.signals || []).map(s => s.source).filter(Boolean));
      if (status === "left") flash(c.name + " appears to have left. Research stopped.");
      else flash("Research complete for " + c.name + ".");
    } catch (e) {
      setContact(id, { status: "new" });
      flash("Research failed. " + (e.message || ""));
    }
  };

  /* ---------------- Generate outreach ---------------- */
  const [genBusy, setGenBusy] = useState("");
  const generate = async (id) => {
    const c = contacts.find(x => x.id === id); if (!c) return;
    if (c.status === "left") { flash("This person has left. Exclude from outreach."); return; }
    setGenBusy(id);
    try {
      const div = DIVISIONS[c.division] || DIVISIONS["Electrophysiology"];
      const system = [
        buildWritingBrief(),
        "",
        "ACCOUNT CONTEXT on Boston Scientific, for your understanding only, do not parrot it back:",
        intelDigest(),
        "",
        "WHAT MATTERS FOR THIS PERSON'S DIVISION (" + c.division + "):",
        div.angle + " The non obvious way in is this. " + div.wedge,
        direction ? "\nSTANDING DIRECTION FROM THE OPERATOR, follow it:\n" + direction : "",
        "",
        "Before the drafts, do the thinking. Write the single idea each message is built around. For each main signal or pressure, write the decision or risk it creates for this person. List what this person already knows, so the message never states the obvious.",
        "",
        "Return only valid JSON, no markdown:",
        "{\"fit\":true,\"fitReason\":\"\",\"resonanceLine\":\"\",\"soWhat\":[\"\"],\"alreadyKnows\":[\"\"],\"emails\":[{\"angle\":\"3 to 5 word label\",\"subject\":\"\",\"body\":\"\"},{\"angle\":\"\",\"subject\":\"\",\"body\":\"\"}],\"inmails\":[{\"angle\":\"\",\"body\":\"\"},{\"angle\":\"\",\"body\":\"\"}]}",
        "Use \\n for line breaks inside a body. End each body before any sign off, the app adds the signature.",
      ].join("\n");
      const user = [
        "READER",
        "Name: " + c.name,
        "Title: " + (c.title || "senior leader"),
        "Division: " + c.division,
        "Region: " + (c.region || "not stated"),
        "Verification: " + c.status,
        "Researcher summary: " + (c.summary || "none"),
        "Verified recent signals: " + (c.signals.length ? c.signals.map(s => s.text + " (" + (s.date || "") + ")").join(" | ") : "none, so open on the division decision, not a personal hook"),
        "Top scored pressures: " + (c.pains.length ? c.pains.map(p => p.pain + " (" + p.score + "/10)").join(" | ") : "infer from the division"),
      ].join("\n");
      const text = await callClaude({ system, user, model: settings.model, apiKey: settings.apiKey, maxTokens: 4000 });
      const p = extractJSON(text);
      if (p && p.emails) {
        const drafts = {
          fit: p.fit !== false,
          fitReason: sanitize(p.fitReason || ""),
          resonanceLine: sanitize(p.resonanceLine || ""),
          soWhat: (p.soWhat || []).map(sanitize).filter(Boolean),
          alreadyKnows: (p.alreadyKnows || []).map(sanitize).filter(Boolean),
          emails: (p.emails || []).slice(0, 2).map(e => ({ angle: sanitize(e.angle || ""), subject: sanitize(e.subject || ""), body: sanitize(e.body || "") })),
          inmails: (p.inmails || []).slice(0, 2).map(m => ({ angle: sanitize(m.angle || ""), body: sanitize(m.body || "") })),
          findings: null,
        };
        setContact(id, { drafts });
        logAudit("Outreach drafted", c.name + ", " + c.division, []);
        flash(drafts.fit ? "Drafts ready for " + c.name + "." : "Marked as not a fit. See the note.");
      } else flash("Generation returned an unexpected shape. Try again.");
    } catch (e) { flash("Generation failed. " + (e.message || "")); }
    finally { setGenBusy(""); }
  };

  /* ---------------- Independent audit, the stress test ---------------- */
  const [stressBusy, setStressBusy] = useState("");
  const stressTest = async (id) => {
    const c = contacts.find(x => x.id === id); const d = c && c.drafts; if (!c || !d) return;
    setStressBusy(id);
    try {
      const system = [
        "You are an independent fact checker. Use web search to test every checkable claim in the drafts below.",
        "For each claim, return confirmed, nuanced or not_verifiable, a one line note, and a source where you found one.",
        "Then return cleaned drafts with any weak or unsupported claim removed or softened. Keep the plain English standard, no em dashes, no arrows, sentence case. Email 150 to 170 words, LinkedIn 70 to 100 words. If every claim holds, return the drafts unchanged.",
        "Return only valid JSON: {\"findings\":[{\"claim\":\"\",\"verdict\":\"confirmed|nuanced|not_verifiable\",\"note\":\"\",\"source\":\"\"}],\"emails\":[{\"angle\":\"\",\"subject\":\"\",\"body\":\"\"},{\"angle\":\"\",\"subject\":\"\",\"body\":\"\"}],\"inmails\":[{\"angle\":\"\",\"body\":\"\"},{\"angle\":\"\",\"body\":\"\"}]}",
      ].join("\n");
      const user = "Contact: " + c.name + ", " + (c.title || "") + ", " + c.division + ", Boston Scientific.\n\n" +
        d.emails.map((e, i) => "Email " + (i + 1) + " subject: " + e.subject + "\n" + e.body).join("\n\n") + "\n\n" +
        d.inmails.map((m, i) => "LinkedIn " + (i + 1) + ": " + m.body).join("\n\n");
      const text = await callClaude({ system, user, model: settings.model, apiKey: settings.apiKey, useSearch: true, maxTokens: 4000 });
      const p = extractJSON(text);
      if (p) {
        setContact(id, prev => ({
          drafts: {
            ...prev.drafts,
            emails: p.emails ? p.emails.slice(0, 2).map(e => ({ angle: sanitize(e.angle || ""), subject: sanitize(e.subject || ""), body: sanitize(e.body || "") })) : prev.drafts.emails,
            inmails: p.inmails ? p.inmails.slice(0, 2).map(m => ({ angle: sanitize(m.angle || ""), body: sanitize(m.body || "") })) : prev.drafts.inmails,
            findings: (p.findings || []).map(f => ({ claim: sanitize(f.claim), verdict: f.verdict, note: sanitize(f.note || ""), source: f.source || "" })),
          },
        }));
        logAudit("Independent audit", c.name + ", " + (p.findings ? p.findings.length : 0) + " claims checked", (p.findings || []).map(f => f.source).filter(Boolean));
        flash("Audit complete.");
      } else flash("Audit returned an unexpected shape.");
    } catch (e) { flash("Audit failed. " + (e.message || "")); }
    finally { setStressBusy(""); }
  };

  /* ---------------- Approve and export ---------------- */
  const approve = (c, channel, variant, draft) => {
    const signer = SIGNERS[settings.signer] || SIGNERS[0];
    setApproved(prev => [{
      id: "a_" + Date.now() + "_" + Math.random().toString(36).slice(2, 6),
      name: c.name, email: c.email, title: c.title, division: c.division,
      channel, variant, subject: draft.subject || "",
      body: draft.body + "\n\n" + signer.name + "\n" + signer.title,
      signedBy: signer.name, approvedAt: new Date().toISOString().slice(0, 16).replace("T", " "),
    }, ...prev]);
    logAudit("Approved for send", c.name + ", " + channel + " " + variant + ", signed by " + signer.name, []);
    flash("Approved and saved.");
  };

  const downloadCSV = () => {
    if (!approved.length) return;
    const rows = approved.map(a => ({
      "Contact name": a.name, "Email": a.email, "Title": a.title, "Division": a.division,
      "Channel": a.channel, "Variant": a.variant, "Subject": a.subject, "Message": a.body,
      "Signed by": a.signedBy, "Approved at": a.approvedAt,
    }));
    const blob = new Blob([Papa.unparse(rows)], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "futurebridge_bsx_approved.csv"; a.click();
    URL.revokeObjectURL(url);
  };

  const copy = async (text, label) => {
    try { await navigator.clipboard.writeText(text); }
    catch (e) { const ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta); ta.select(); try { document.execCommand("copy"); } catch (er) {} document.body.removeChild(ta); }
    flash((label || "Copied") + ".");
  };

  const TABS = [["intel", "Intelligence"], ["contacts", "Contacts"], ["outreach", "Outreach"], ["approved", "Approved, " + approved.length], ["settings", "Settings"]];
  const keySet = !!settings.apiKey;

  return (
    <div>
      <header className="bar">
        <div className="wrap inner">
          <Mark size={34} />
          <div>
            <div className="eyebrow">FutureBridge, Life Sciences and MedTech</div>
            <h1 className="title">Account Studio</h1>
          </div>
          <div className="acct">
            <div className="k">Account</div>
            <div className="v">Boston Scientific</div>
          </div>
        </div>
      </header>

      <nav className="tabs">
        <div className="wrap inner">
          {TABS.map(([k, t]) => (
            <button key={k} className={tab === k ? "on" : ""} onClick={() => setTab(k)}>{t}</button>
          ))}
        </div>
      </nav>

      <main>
        <div className="wrap">
          {!keySet && tab !== "settings" ? (
            <div className="card" style={{ borderLeft: "3px solid var(--red)" }}>
              <div className="body">
                <strong>Set your Anthropic key to start.</strong>
                <p className="note" style={{ margin: "6px 0 10px" }}>Research, drafting and the audit reach the model directly from this page. The key stays in your browser. Open Settings to add it.</p>
                <button className="btn red sm" onClick={() => setTab("settings")}>Open Settings</button>
              </div>
            </div>
          ) : null}

          {tab === "intel" ? (
            <IntelView intel={intel} stamp={intelStamp} refreshing={refreshing} onRefresh={refreshIntel} keySet={keySet} />
          ) : null}

          {tab === "contacts" ? (
            <ContactsView
              contacts={contacts} setContact={setContact} setContacts={setContacts}
              onUpload={() => fileRef.current && fileRef.current.click()} onAddManual={addManual}
              onResearch={research} onGenerate={generate} genBusy={genBusy} keySet={keySet}
              goOutreach={() => setTab("outreach")}
            />
          ) : null}

          {tab === "outreach" ? (
            <OutreachView
              contacts={contacts} signer={SIGNERS[settings.signer]} onGenerate={generate} genBusy={genBusy}
              onStress={stressTest} stressBusy={stressBusy} onApprove={approve} onCopy={copy} keySet={keySet}
              goContacts={() => setTab("contacts")}
            />
          ) : null}

          {tab === "approved" ? (
            <ApprovedView approved={approved} setApproved={setApproved} onDownload={downloadCSV} onCopy={copy} />
          ) : null}

          {tab === "settings" ? (
            <SettingsView settings={settings} setSettings={setSettings} direction={direction} setDirection={setDirection} audit={audit} setAudit={setAudit} />
          ) : null}
        </div>
      </main>

      <input ref={fileRef} type="file" accept=".csv,.xlsx,.xls" style={{ display: "none" }}
        onChange={e => { if (e.target.files && e.target.files[0]) handleFile(e.target.files[0]); e.target.value = ""; }} />

      {toast ? <div className="toast">{toast}</div> : null}
    </div>
  );
}

/* ---------------- Intelligence ---------------- */
function IntelView({ intel, stamp, refreshing, onRefresh, keySet }) {
  return (
    <div>
      <p className="lead">A working read on the account. The figures are a baseline. Refresh them from live sources, with a citation on each, before anything goes into a message.</p>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, flexWrap: "wrap", marginBottom: 16 }}>
        <span className="tiny">{stamp}</span>
        <button className="btn primary" disabled={refreshing || !keySet} onClick={onRefresh}>{refreshing ? "Pulling live sources" : "Refresh from live sources"}</button>
      </div>
      {intel.map(s => (
        <div className="card" key={s.id}>
          <div className="cap">{s.title}</div>
          <div className="body">
            {s.bullets.map((b, i) => (
              <div className="ibul" key={i}>
                <span className="dot" />
                <p>{b.text}{b.source ? <a className="src" href={b.source} target="_blank" rel="noreferrer">source</a> : null}</p>
              </div>
            ))}
          </div>
        </div>
      ))}
      <div className="builton">
        <p className="k">Division playbook in force</p>
        {Object.entries(DIVISIONS).map(([k, v]) => (
          <p key={k} style={{ margin: "0 0 6px", fontSize: 13 }}>
            <strong>{k}</strong> <span className={"pri " + (v.priority === "P2" ? "p2" : v.priority.indexOf("P3") > -1 ? "p3" : "")}>({v.priority})</span>. {v.wedge}
          </p>
        ))}
      </div>
    </div>
  );
}

/* ---------------- Contacts ---------------- */
function StatusPill({ status }) {
  const m = {
    new: ["Not researched", ""], researching: ["Researching", "warn"],
    verified: ["Verified, current", "ok"], left: ["Left the company", "bad"], unclear: ["Could not confirm", "warn"],
  }[status] || ["Not researched", ""];
  return <span className={"pill " + m[1]}>{m[0]}</span>;
}

function ContactsView({ contacts, setContact, setContacts, onUpload, onAddManual, onResearch, onGenerate, genBusy, keySet, goOutreach }) {
  return (
    <div>
      <p className="lead">Load your target list, then research each person. Research checks they still hold the role before anything else, then gathers recent public signals and scores their likely pressures.</p>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 18 }}>
        <button className="btn primary" onClick={onUpload}>Upload list, CSV or Excel</button>
        <button className="btn" onClick={onAddManual}>Add one by hand</button>
      </div>
      {!contacts.length ? (
        <div className="empty">No contacts yet. Upload the target list to begin. Columns are matched by name, so name, title, division, email and LinkedIn are all picked up.</div>
      ) : contacts.map(c => (
        <div className="card" key={c.id}>
          <div className="crow">
            <div style={{ minWidth: 200 }}>
              {c.name
                ? <div className="cname">{c.name}</div>
                : <input className="f" style={{ maxWidth: 220 }} placeholder="Full name" value={c.name} onChange={e => setContact(c.id, { name: e.target.value })} />}
              <div className="ctitle">{c.title || "Title not set"}{c.region ? ", " + c.region : ""}</div>
            </div>
            <select className="f" style={{ width: 240 }} value={c.division} onChange={e => setContact(c.id, { division: e.target.value })}>
              {Object.keys(DIVISIONS).map(d => <option key={d}>{d}</option>)}
            </select>
            <StatusPill status={c.status} />
            <div className="grow">
              <button className="btn sm" disabled={c.status === "researching" || !keySet} onClick={() => onResearch(c.id)}>
                {c.status === "researching" ? "Researching" : c.status === "new" ? "Verify and research" : "Re run research"}
              </button>
              <button className="btn sm" disabled={c.status === "left" || genBusy === c.id || !keySet} onClick={() => onGenerate(c.id)}>
                {genBusy === c.id ? "Writing" : "Draft outreach"}
              </button>
              <button className="btn sm" onClick={() => setContacts(prev => prev.filter(x => x.id !== c.id))}>Remove</button>
            </div>
          </div>

          {c.status === "left" ? (
            <div className="body" style={{ borderTop: "1px solid var(--hair)", color: "var(--red)", fontSize: 13 }}>
              Sources suggest this person has left Boston Scientific. Research stopped. Exclude from outreach.
            </div>
          ) : (c.summary || c.signals.length || c.pains.length) ? (
            <div className="body" style={{ borderTop: "1px solid var(--hair)" }}>
              {c.summary ? <p style={{ margin: "0 0 10px", fontSize: 13.5 }}>{c.summary}</p> : null}
              {c.signals.length ? (
                <div style={{ marginBottom: 10 }}>
                  <p className="tiny" style={{ margin: "0 0 5px", textTransform: "uppercase", letterSpacing: ".8px" }}>Recent signals</p>
                  {c.signals.map((s, i) => (
                    <p key={i} style={{ margin: "0 0 4px", fontSize: 13 }}>{s.text} <span className="tiny">{s.date}</span>{s.source ? <a className="src" href={s.source} target="_blank" rel="noreferrer">source</a> : null}</p>
                  ))}
                </div>
              ) : null}
              {c.pains.length ? (
                <div>
                  <p className="tiny" style={{ margin: "0 0 5px", textTransform: "uppercase", letterSpacing: ".8px" }}>Likely pressures</p>
                  {c.pains.map((p, i) => (
                    <p key={i} style={{ margin: "0 0 4px", fontSize: 13 }}><span className="pri">{p.score}/10</span> {p.pain}<span className="tiny"> {p.reason}</span></p>
                  ))}
                </div>
              ) : null}
              {c.drafts ? <p className="tiny" style={{ marginTop: 10 }}>Drafts ready. Open the Outreach tab to read and approve.</p> : null}
            </div>
          ) : null}
        </div>
      ))}
      {contacts.some(c => c.drafts) ? <button className="btn" onClick={goOutreach} style={{ marginTop: 4 }}>Go to Outreach</button> : null}
    </div>
  );
}

/* ---------------- Outreach ---------------- */
function DraftCard({ channel, variant, angle, subject, body, signer, onApprove, onCopy }) {
  const full = (subject ? "Subject: " + subject + "\n\n" : "") + body + "\n\n" + signer.name + "\n" + signer.title;
  const count = wc(body);
  const target = channel === "Email" ? "150 to 170" : "70 to 100";
  return (
    <div className="draft">
      <div className="top">
        <span className="angle">{channel}, {angle || variant}</span>
        <span className="wc">{count} words, aim {target}</span>
      </div>
      <div style={{ padding: "13px 14px", flex: 1 }}>
        {subject ? <p className="subject">{subject}</p> : null}
        <p className="text">{body}</p>
        <p className="sign">{signer.name}<br />{signer.title}</p>
      </div>
      <div className="acts">
        <button className="btn sm" onClick={() => onCopy(full, "Copied")}>Copy</button>
        <button className="btn primary sm" onClick={onApprove}>Approve</button>
      </div>
    </div>
  );
}

function OutreachView({ contacts, signer, onGenerate, genBusy, onStress, stressBusy, onApprove, onCopy, keySet, goContacts }) {
  const ready = contacts.filter(c => c.drafts);
  const researched = contacts.filter(c => c.status !== "new" && c.status !== "left" && !c.drafts);
  if (!ready.length && !researched.length) {
    return <div className="empty">Nothing to draft yet. Research a contact first, then draft their outreach.<div style={{ marginTop: 12 }}><button className="btn" onClick={goContacts}>Go to Contacts</button></div></div>;
  }
  return (
    <div>
      <p className="lead">Two emails and two LinkedIn messages per person, each taking a genuinely different angle. The panel above each set shows the one idea the message is built on and what the reader already knows, so nothing states the obvious.</p>

      {researched.map(c => (
        <div className="card" key={c.id}>
          <div className="crow">
            <div><div className="cname">{c.name}</div><div className="ctitle">{c.title}, {c.division}</div></div>
            <div className="grow"><button className="btn sm primary" disabled={genBusy === c.id || !keySet} onClick={() => onGenerate(c.id)}>{genBusy === c.id ? "Writing" : "Draft outreach"}</button></div>
          </div>
        </div>
      ))}

      {ready.map(c => {
        const d = c.drafts;
        return (
          <div className="card" key={c.id}>
            <div className="cap" style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
              <span>{c.name}</span><span className="tiny" style={{ fontWeight: 400 }}>{c.title}, {c.division}</span>
              <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
                <button className="btn sm" disabled={stressBusy === c.id || !keySet} onClick={() => onStress(c.id)}>{stressBusy === c.id ? "Checking" : "Run independent audit"}</button>
                <button className="btn sm" disabled={genBusy === c.id || !keySet} onClick={() => onGenerate(c.id)}>{genBusy === c.id ? "Writing" : "Redraft"}</button>
              </div>
            </div>
            <div className="body">
              {!d.fit ? (
                <p style={{ margin: 0, color: "var(--warn)", fontSize: 14 }}>Marked as not a fit. {d.fitReason}</p>
              ) : (
                <div>
                  <div className="builton">
                    <p className="k">Built on</p>
                    {d.resonanceLine ? <p className="reson">{d.resonanceLine}</p> : null}
                    {d.soWhat.length ? (<><p className="k">What each signal means for them</p><ul>{d.soWhat.map((s, i) => <li key={i}>{s}</li>)}</ul></>) : null}
                    {d.alreadyKnows.length ? (<><p className="k">What they already know</p><ul>{d.alreadyKnows.map((s, i) => <li key={i}>{s}</li>)}</ul></>) : null}
                  </div>

                  <p className="tiny" style={{ textTransform: "uppercase", letterSpacing: ".8px", margin: "6px 0 8px" }}>Emails</p>
                  <div className="drafts" style={{ marginBottom: 16 }}>
                    {d.emails.map((e, i) => (
                      <DraftCard key={i} channel="Email" variant={"Email " + (i + 1)} angle={e.angle} subject={e.subject} body={e.body} signer={signer}
                        onApprove={() => onApprove(c, "Email", "Email " + (i + 1), e)} onCopy={onCopy} />
                    ))}
                  </div>

                  <p className="tiny" style={{ textTransform: "uppercase", letterSpacing: ".8px", margin: "6px 0 8px" }}>LinkedIn messages</p>
                  <div className="drafts">
                    {d.inmails.map((m, i) => (
                      <DraftCard key={i} channel="LinkedIn" variant={"LinkedIn " + (i + 1)} angle={m.angle} subject="" body={m.body} signer={signer}
                        onApprove={() => onApprove(c, "LinkedIn", "LinkedIn " + (i + 1), m)} onCopy={onCopy} />
                    ))}
                  </div>

                  {d.findings && d.findings.length ? (
                    <div style={{ marginTop: 16 }}>
                      <p className="tiny" style={{ textTransform: "uppercase", letterSpacing: ".8px", margin: "0 0 8px" }}>Audit findings</p>
                      {d.findings.map((f, i) => (
                        <div className="find" key={i}>
                          <span className={"vc " + (f.verdict || "")}>{(f.verdict || "").replace("_", " ")}</span>
                          {f.claim}. <span className="muted">{f.note}</span>
                          {f.source ? <a className="src" href={f.source} target="_blank" rel="noreferrer">source</a> : null}
                        </div>
                      ))}
                    </div>
                  ) : null}
                </div>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ---------------- Approved ---------------- */
function ApprovedView({ approved, setApproved, onDownload, onCopy }) {
  return (
    <div>
      <p className="lead">Every approved message collects here with its signature. Nothing sends on its own. Download a file you can import to HubSpot, or copy a message to send by hand.</p>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 16 }}>
        <button className="btn primary" disabled={!approved.length} onClick={onDownload}>Download HubSpot ready CSV</button>
        {approved.length ? <button className="btn" onClick={() => { if (confirm("Clear all approved messages?")) setApproved([]); }}>Clear all</button> : null}
      </div>
      {!approved.length ? (
        <div className="empty">Nothing approved yet. Approve a draft on the Outreach tab and it lands here.</div>
      ) : approved.map(a => (
        <div className="card" key={a.id}>
          <div className="cap" style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap", fontWeight: 400 }}>
            <strong style={{ fontSize: 14 }}>{a.name}</strong>
            <span className="tiny">{a.channel}, {a.variant}, signed by {a.signedBy}, {a.approvedAt}</span>
            <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
              <button className="btn sm" onClick={() => onCopy((a.subject ? "Subject: " + a.subject + "\n\n" : "") + a.body, "Copied")}>Copy</button>
              <button className="btn sm" onClick={() => setApproved(prev => prev.filter(x => x.id !== a.id))}>Remove</button>
            </div>
          </div>
          <div className="body">
            {a.subject ? <p className="subject" style={{ marginBottom: 8 }}>{a.subject}</p> : null}
            <p className="text">{a.body}</p>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ---------------- Settings ---------------- */
function SettingsView({ settings, setSettings, direction, setDirection, audit, setAudit }) {
  const set = (patch) => setSettings(prev => ({ ...prev, ...patch }));
  return (
    <div>
      <p className="lead">The studio runs from this page. The key, your edits, contacts and approvals live only in this browser. Nothing is held on a FutureBridge server.</p>

      <div className="card">
        <div className="cap">Connection</div>
        <div className="body">
          <label className="lab">Anthropic API key</label>
          <input className="f" type="password" placeholder="sk-ant-..." value={settings.apiKey} onChange={e => set({ apiKey: e.target.value.trim() })} />
          <p className="note" style={{ margin: "6px 0 16px" }}>Used to research, draft and audit directly from this page. Stored in this browser only. Get one at <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noreferrer">console.anthropic.com</a>.</p>

          <div className="grid2">
            <div>
              <label className="lab">Model</label>
              <select className="f" value={settings.model} onChange={e => set({ model: e.target.value })}>
                {MODELS.map(m => <option key={m.id} value={m.id}>{m.label}</option>)}
              </select>
            </div>
            <div>
              <label className="lab">Default signer</label>
              <select className="f" value={settings.signer} onChange={e => set({ signer: Number(e.target.value) })}>
                {SIGNERS.map((s, i) => <option key={i} value={i}>{s.name}, {s.title}</option>)}
              </select>
            </div>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="cap">Standing direction</div>
        <div className="body">
          <p className="note" style={{ margin: "0 0 8px" }}>Plain instructions that apply to every future draft. For example, keep openings to one sentence, or push every Endoscopy message toward the weight loss drug angle. The plain English standard always applies underneath.</p>
          <textarea className="f" style={{ minHeight: 110 }} value={direction} onChange={e => setDirection(e.target.value)} placeholder="Empty. Add standing rules here." />
        </div>
      </div>

      <div className="card">
        <div className="cap">How the studio keeps its output trustworthy</div>
        <div className="body">
          <div className="ibul"><span className="dot" /><p>Every claim in the intelligence carries a source, pulled live on refresh.</p></div>
          <div className="ibul"><span className="dot" /><p>A separate audit checks the facts in a draft before it is used, and returns a cleaned version.</p></div>
          <div className="ibul"><span className="dot" /><p>No divisional financials are invented. Private figures are treated as questions, not stated as fact.</p></div>
          <div className="ibul"><span className="dot" /><p>A person approves every message. Nothing sends on its own.</p></div>
          <div className="ibul"><span className="dot" /><p>The plain English standard is built into the drafting, not left to the writer.</p></div>
          <div className="ibul"><span className="dot" /><p>The audit log records what was checked, when, and against which sources.</p></div>
        </div>
      </div>

      <div className="card">
        <div className="cap" style={{ display: "flex", alignItems: "center" }}>
          Audit log
          {audit.length ? <button className="btn sm" style={{ marginLeft: "auto", fontWeight: 400 }} onClick={() => { if (confirm("Clear the audit log?")) setAudit([]); }}>Clear</button> : null}
        </div>
        <div className="body">
          {!audit.length ? <p className="note" style={{ margin: 0 }}>Nothing logged yet. Research, drafting, audits and approvals are recorded here.</p> :
            audit.map((e, i) => (
              <div key={i} style={{ fontSize: 12.5, padding: "6px 0", borderBottom: i === audit.length - 1 ? "none" : "1px solid var(--hair)" }}>
                <span className="tiny">{e.time}</span> <strong>{e.type}</strong>. {e.detail}
                {e.sources && e.sources.length ? <span className="tiny"> {e.sources.length} source{e.sources.length > 1 ? "s" : ""}</span> : null}
              </div>
            ))}
        </div>
      </div>

      <p className="note">Contact details are personal data. Handle them under your usual data protection practice. The audit log helps, because it records why a person is believed to hold the role attributed to them.</p>
    </div>
  );
}

const boot = document.getElementById("boot");
if (boot) boot.remove();
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
