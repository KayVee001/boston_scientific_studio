<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FutureBridge Account Studio, Boston Scientific</title>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
  :root{
    --paper:#F7F6F2; --surface:#FFFFFF; --ink:#172A3A; --ink-2:#46586A; --faint:#8B96A1;
    --hair:#E7E4DD; --panel:#F2F0EB; --red:#D8281C; --red-soft:#FBEDEC;
    --ok:#2E7D52; --ok-soft:#EAF4EE; --warn:#9A6B12; --warn-soft:#F7F0E0; --blue:#2C5A78;
    --r:6px; --maxw:1080px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:1.62;-webkit-font-smoothing:antialiased}
  a{color:var(--blue)}
  ::selection{background:#F6D9D6}
  #boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:var(--paper);z-index:9}
  #boot .fade{color:var(--faint);font-size:13px}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 22px}

  header.bar{border-bottom:1px solid var(--hair);background:var(--surface);position:sticky;top:0;z-index:20}
  .bar .inner{display:flex;align-items:center;gap:14px;padding:13px 26px}
  .eyebrow{font-size:10.5px;letter-spacing:1.6px;text-transform:uppercase;color:var(--red);font-weight:700}
  h1.title{font-size:17px;font-weight:700;margin:1px 0 0}
  .spacer{margin-left:auto}
  .acct{text-align:right;margin-right:6px}
  .acct .k{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--faint)}
  .acct .v{font-size:13px;font-weight:700}

  .app{display:flex;align-items:flex-start}
  .side{flex:0 0 232px;width:232px;border-right:1px solid var(--hair);background:var(--surface);padding:20px 14px;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
  .side .snav{display:flex;flex-direction:column;gap:3px}
  .side .snav button{appearance:none;text-align:left;background:transparent;border:none;cursor:pointer;font:inherit;font-size:14px;color:var(--ink-2);padding:10px 13px;border-radius:8px;display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;transition:background .12s}
  .side .snav button:hover{background:#FCFBF9;color:var(--ink)}
  .side .snav button.on{background:var(--panel);color:var(--ink);font-weight:700;box-shadow:inset 3px 0 0 var(--red)}
  .side .snav .badge{font-size:11px;font-weight:700;color:#fff;background:var(--red);border-radius:100px;padding:1px 8px;min-width:20px;text-align:center}
  .side .sgroup{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--faint);font-weight:700;padding:0 13px;margin:18px 0 8px}
  .side .sfoot{margin-top:18px;padding-top:16px;border-top:1px solid var(--hair)}
  .content{flex:1 1 auto;min-width:0;padding:28px 34px 100px}
  .content-inner{max-width:1240px;margin:0 auto;width:100%}
  @media(max-width:880px){
    .side{position:static;height:auto;width:100%;flex-basis:auto;border-right:none;border-bottom:1px solid var(--hair);padding:10px 14px}
    .side .snav{flex-direction:row;flex-wrap:wrap;gap:4px}
    .side .snav button{width:auto}
    .side .snav button.on{box-shadow:none;border-bottom:2px solid var(--red)}
    .side .sgroup,.side .sfoot{display:none}
    .app{flex-direction:column}
    .content{padding:22px 18px 80px}
  }
  .lead{color:var(--ink-2);font-size:14px;max-width:74ch;margin:0 0 22px}

  .btn{appearance:none;font:inherit;font-size:13.5px;cursor:pointer;border-radius:var(--r);border:1px solid var(--hair);background:var(--surface);color:var(--ink);padding:8px 14px;transition:background .12s}
  .btn:hover{background:var(--panel)}
  .btn.primary{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:700}
  .btn.primary:hover{background:#0f2230}
  .btn.red{background:var(--red);border-color:var(--red);color:#fff;font-weight:700}
  .btn.red:hover{background:#bf2017}
  .btn.sm{padding:5px 10px;font-size:12.5px}
  .btn:disabled{opacity:.5;cursor:default}
  .btn:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--red);outline-offset:2px}
  .spin{display:inline-block;width:12px;height:12px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-1px;margin-right:6px}
  @keyframes sp{to{transform:rotate(360deg)}}

  .card{background:var(--surface);border:1px solid var(--hair);border-radius:var(--r);margin-bottom:16px}
  .card .cap{padding:11px 16px;border-bottom:1px solid var(--hair);font-size:14px;font-weight:700;background:#FCFBF9;border-radius:var(--r) var(--r) 0 0}
  .card .body{padding:14px 16px}
  .muted{color:var(--ink-2)} .tiny{font-size:12px;color:var(--faint)}
  label.lab{display:block;font-size:10.5px;letter-spacing:.9px;text-transform:uppercase;color:var(--ink-2);margin:0 0 6px}
  input.f,select.f,textarea.f{width:100%;font:inherit;font-size:14px;color:var(--ink);background:var(--surface);border:1px solid var(--hair);border-radius:var(--r);padding:9px 11px;outline:none}
  textarea.f{resize:vertical;line-height:1.55}
  input.f:focus,select.f:focus,textarea.f:focus{border-color:var(--ink-2)}

  .pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;border:1px solid var(--hair);border-radius:100px;padding:3px 10px;background:var(--panel);color:var(--ink-2);white-space:nowrap}
  .pill.ok{background:var(--ok-soft);color:var(--ok);border-color:#CFE6D9}
  .pill.warn{background:var(--warn-soft);color:var(--warn);border-color:#EBDFC2}
  .pill.bad{background:var(--red-soft);color:var(--red);border-color:#F2CFCC}
  .pri{font-weight:700;color:var(--red)} .pri.p2{color:var(--warn)} .pri.p3{color:var(--faint)}

  .ibul{display:flex;gap:10px;margin:0 0 11px} .ibul:last-child{margin-bottom:0}
  .ibul .dot{width:7px;height:7px;background:var(--red);margin-top:8px;flex:0 0 auto;border-radius:1px}
  .ibul p{margin:0;font-size:14px}
  .src{font-size:11.5px;color:var(--blue);margin-left:6px;text-decoration:underline}

  .exp{border:1px solid var(--hair);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
  .exp .head{display:flex;gap:10px;align-items:flex-start;padding:11px 13px;cursor:pointer;background:var(--surface)}
  .exp .head:hover{background:#FCFBF9}
  .exp .chev{margin-left:auto;color:var(--faint);font-size:12px;flex:0 0 auto;padding-left:8px}
  .exp .detail{padding:0 13px 12px 33px;font-size:13px;color:var(--ink-2);line-height:1.6}

  .tbl{width:100%;border-collapse:collapse;font-size:13px}
  .tbl th,.tbl td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--hair);vertical-align:middle;line-height:1.5}
  .tbl th{font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-2);font-weight:700;background:#FCFBF9;white-space:nowrap}
  .tbl th.num,.tbl td.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .tbl td:first-child{font-weight:600}
  .tbl tr:last-child td{border-bottom:none}
  .tbl tr.tot td{font-weight:700;background:#FCFBF9}
  .tbl.fin td:first-child{font-weight:400;color:var(--ink-2)}
  .tblwrap{overflow-x:auto;border:1px solid var(--hair);border-radius:var(--r)}

  .tgt{border:1px solid var(--hair);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;background:#fff}
  .tgt-h{display:flex;align-items:flex-start;gap:12px}
  .tgt-h > div:first-child{flex:1}
  .tgt-role{font-size:14.5px;font-weight:700}
  .tgt-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-top:13px}
  @media(max-width:760px){.tgt-grid{grid-template-columns:1fr;gap:10px}}
  .tgt-grid > div{font-size:13px;line-height:1.55}
  .tgt-k{display:block;font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--faint);margin-bottom:3px;font-weight:700}
  .tgt-hit{margin-top:12px;padding:9px 12px;border-radius:var(--r);font-size:13px}
  .tgt-hit.ok{background:var(--ok-soft);border:1px solid #CFE6D9;color:var(--ink)}
  .tgt-hit.none{background:var(--panel);border:1px solid var(--hair);color:var(--ink-2)}
  .flag{display:inline-block;font-size:10.5px;color:var(--warn);background:var(--warn-soft);border:1px solid #EBDFC2;border-radius:4px;padding:0 6px;margin-left:6px}

  .crow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:14px 16px}
  .cname{font-size:15px;font-weight:700} .ctitle{font-size:12.5px;color:var(--ink-2)}
  .grow{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}

  .mail{border:1px solid var(--hair);border-radius:var(--r);background:var(--surface)}
  .mail .top{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--hair);background:#FCFBF9;flex-wrap:wrap}
  .mail .wc{margin-left:auto;font-size:11px;color:var(--faint)}
  .mail .inner2{padding:14px 16px}
  .mail .subject{font-size:14px;font-weight:700;margin:0 0 10px}
  .mail .text{font-size:14px;line-height:1.7;white-space:pre-wrap;margin:0}
  .mail .sign{margin:14px 0 0;font-size:13px;color:var(--ink-2)}
  .mail .acts{display:flex;gap:8px;padding:11px 14px;border-top:1px solid var(--hair);flex-wrap:wrap}

  .builton{background:var(--panel);border:1px solid var(--hair);border-left:3px solid var(--red);border-radius:var(--r);padding:13px 15px;margin-bottom:14px}
  .builton .k{font-size:10.5px;letter-spacing:.9px;text-transform:uppercase;color:var(--ink-2);margin:0 0 4px}
  .builton .insight{font-size:15px;font-weight:700;margin:0 0 10px}
  .builton ul{margin:0 0 8px;padding-left:18px} .builton li{font-size:13px;margin:0 0 4px}

  .find{font-size:12.5px;padding:9px 11px;border:1px solid var(--hair);border-radius:var(--r);margin-bottom:6px;background:#fff}
  .vc{font-weight:700;margin-right:6px} .vc.confirmed{color:var(--ok)} .vc.nuanced{color:var(--warn)} .vc.unsupported{color:var(--red)} .vc.not_verifiable{color:var(--red)}
  .conf{display:inline-block;width:70px;height:7px;border-radius:4px;background:var(--hair);overflow:hidden;vertical-align:middle;margin:0 6px}
  .conf > i{display:block;height:100%;background:var(--ok)}

  .empty{border:1px dashed var(--hair);border-radius:var(--r);padding:42px 22px;text-align:center;color:var(--ink-2);font-size:14px}
  .note{font-size:12.5px;color:var(--ink-2);line-height:1.55}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px} @media(max-width:680px){.grid2{grid-template-columns:1fr}}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;padding:11px 18px;border-radius:var(--r);z-index:80;box-shadow:0 6px 24px rgba(0,0,0,.18);max-width:90vw}

  .scrim{position:fixed;inset:0;background:rgba(20,30,40,.32);z-index:60}
  .drawer{position:fixed;top:0;right:0;height:100%;width:400px;max-width:92vw;background:var(--surface);border-left:1px solid var(--hair);z-index:70;display:flex;flex-direction:column;box-shadow:-8px 0 30px rgba(0,0,0,.10)}
  .drawer .dhead{padding:14px 16px;border-bottom:1px solid var(--hair);display:flex;align-items:center;gap:10px}
  .drawer .dscope{font-size:11px;color:var(--ink-2)}
  .drawer .dbody{flex:1;overflow-y:auto;padding:14px 16px}
  .drawer .dfoot{border-top:1px solid var(--hair);padding:12px 14px}
  .msg{margin-bottom:12px;display:flex} .msg.u{justify-content:flex-end}
  .bub{max-width:88%;font-size:13.5px;line-height:1.55;padding:9px 12px;border-radius:10px;white-space:pre-wrap}
  .msg.u .bub{background:var(--ink);color:#fff;border-bottom-right-radius:3px}
  .msg.a .bub{background:var(--panel);color:var(--ink);border-bottom-left-radius:3px}
  .propose{border:1px solid var(--hair);border-radius:var(--r);padding:10px 12px;margin:6px 0;background:#FCFBF9}
  .propose .lab2{font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--ink-2);margin-bottom:5px}

  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>

<div id="boot">
  <svg width="40" height="40" viewBox="0 0 100 100" aria-hidden="true"><rect x="22" y="16" width="50" height="14" fill="#172A3A"></rect><rect x="22" y="48" width="50" height="14" fill="#172A3A"></rect><rect x="22" y="80" width="14" height="14" fill="#172A3A"></rect></svg>
  <div class="fade">Loading the studio</div>
</div>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ============================================================
   FutureBridge Account Studio, Boston Scientific. Single file.
   Static, hostable on GitHub Pages. The model, the audit and the
   cloud save reach their service only at the moment of use, with
   keys the operator supplies. Working data lives in this browser.
   ============================================================ */

const MODELS = [
  { id: "claude-opus-4-8", label: "Opus 4.8, highest quality" },
  { id: "claude-sonnet-4-6", label: "Sonnet 4.6, recommended" },
  { id: "claude-haiku-4-5-20251001", label: "Haiku 4.5, fastest" },
];
const DEFAULT_MODEL = "claude-sonnet-4-6";

const SIGNERS = [
  { name: "Rajpreet Gill", title: "VP, Client Partnership, FutureBridge" },
  { name: "Manoj Jiandani", title: "Practice Head, Life Sciences and HPC, FutureBridge" },
  { name: "Rachit Singla", title: "Director, Lifesciences, FutureBridge" },
  { name: "Raghuraj Dangi", title: "Director, Lifesciences, FutureBridge" },
];

const FORBIDDEN = [
  "leverage","synergy","synergies","unlock","unleash","empower","holistic","robust","seamless",
  "transformative","transform","disrupt","disruptive","cutting edge","best in class","world class","game changer",
  "paradigm","ecosystem","landscape","journey","deep dive","circle back","value add","north star",
  "move the needle","thought leader","thought leadership","thought partner","at the intersection of",
  "rapidly evolving","in today's rapidly evolving landscape","delve","navigate","elevate","bespoke","curated","supercharge","revolutionary",
  "future proof","strategic imperative",
  "I hope this email finds you well","I wanted to reach out","passion","pivotal","testament","underscore",
  "you will already know","as you are aware","it is important to","leaders must","the winners will be",
  "your hardest problem is","the real issue is","two things follow from that","not a sales call"
].join(", ");

/* Super admin is granted only to these emails, and only after the security
   question is answered. The answer is stored as a simple hash, not in plain
   text, so reading the source does not reveal it. Easy to change: replace
   ANSWER_HASH by running hashStr on your chosen answer in the browser console. */
const SUPERADMINS = ["kayvee.pro@gmail.com", "siva.prasad@futurebridge.com"];
const SECURITY_QUESTION = "What was the make of your first car?";
function hashStr(s) {
  const t = String(s).toLowerCase().replace(/\s+/g, "").trim();
  let h = 5381; for (let i = 0; i < t.length; i++) h = ((h << 5) + h + t.charCodeAt(i)) >>> 0;
  let h2 = 52711; for (let i = 0; i < t.length; i++) h2 = ((h2 << 5) + h2 ^ t.charCodeAt(i)) >>> 0;
  return h.toString(16) + ":" + h2.toString(16);
}
const ANSWER_HASH = "d3d1e77:8dea0451"; // stored only as a hash. To change the answer, run hashStr("your new answer") in the browser console and paste the result here.

function Mark({ size = 32 }) {
  return (<svg width={size} height={size} viewBox="0 0 100 100" aria-label="FutureBridge">
    <rect x="22" y="16" width="50" height="14" fill="#172A3A" /><rect x="22" y="48" width="50" height="14" fill="#172A3A" /><rect x="22" y="80" width="14" height="14" fill="#172A3A" /></svg>);
}

const LS = {
  get(k, d) { try { const v = localStorage.getItem(k); return v == null ? d : JSON.parse(v); } catch (e) { return d; } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) {} },
};

/* Resilient loaders. A saved copy from an older version can have a different
   shape. Reading it blindly would crash the page, so each loader checks the
   shape and falls back to a clean default when it does not match. */
const isObj = (v) => v && typeof v === "object" && !Array.isArray(v);
function loadSettings() {
  const d = { apiKey: "", model: DEFAULT_MODEL, signer: 0, githubToken: "", gistId: "", proxyUrl: "", hubspotToken: "", perplexityKey: "", pdlKey: "" };
  const v = LS.get("fb_settings", null);
  return isObj(v) ? { ...d, ...v } : d;
}
function loadIntel() {
  const v = LS.get("fb_intel", null);
  const ok = isObj(v) && v.version === SEED_INTEL.version && Array.isArray(v.narrative)
    && isObj(v.financials) && Array.isArray(v.financials.rows) && isObj(v.segments) && Array.isArray(v.segments.rows)
    && isObj(v.units) && Array.isArray(v.units.rows) && Array.isArray(v.ma && v.ma.rows ? v.ma.rows : null)
    && isObj(v.market) && Array.isArray(v.market.leader) && Array.isArray(v.market.laggard)
    && isObj(v.strategy) && Array.isArray(v.strategy.corporate) && Array.isArray(v.targets);
  return ok ? v : SEED_INTEL;
}
function loadContacts() {
  const v = LS.get("fb_contacts", []);
  if (!Array.isArray(v)) return [];
  return v.map(c => ({
    ...c,
    signals: Array.isArray(c.signals) ? c.signals : [],
    pains: Array.isArray(c.pains) ? c.pains : [],
    chat: Array.isArray(c.chat) ? c.chat : [],
    draft: isObj(c.draft) ? c.draft : null,
  }));
}
function loadArray(k) { const v = LS.get(k, []); return Array.isArray(v) ? v : []; }

/* ============================================================
   Division playbook. Divisions first. Corporate research second.
   ============================================================ */
const DIVISIONS = {
  "Electrophysiology": { priority: "P1",
    angle: "The new way of treating irregular heartbeats is no longer a race to build a better catheter. Rivals copy the device within a cycle, so the advantage that lasts now sits in the data from each procedure and in how smoothly the lab runs.",
    wedge: "Where this energy method travels next beyond the heart, and who is already moving there first.",
    ambition: "Lead the shift to the new ablation method, then defend it through data and lab workflow rather than the device alone." },
  "Interventional Cardiology": { priority: "P1",
    angle: "Treating high blood pressure through the nerves near the kidneys opens a field that sits between heart care and metabolic health, with competitors arriving from outside the usual device world.",
    wedge: "Which less obvious players enter the high blood pressure field from outside MedTech, and what that does to the next 3 years.",
    ambition: "Hold the lead in complex coronary work and open the high blood pressure field before the field gets crowded." },
  "Endoscopy": { priority: "P1",
    angle: "Energy delivered through the gut is quietly becoming a way to treat metabolic disease. A route into type 2 diabetes would change what this division is, and it would meet the new weight loss drugs head on.",
    wedge: "How an energy based metabolic treatment sits next to the weight loss drug wave rather than under it.",
    ambition: "Move from tools for procedures toward treating disease, starting with the gut as a route into metabolic health." },
  "Interventional Oncology": { priority: "P1",
    angle: "The liver radiation therapy is being treated as a platform that can reach other tumours. Growth now depends on the evidence and the referral routes in cancers that already have a settled standard of care.",
    wedge: "Which cancers open first as the therapy becomes a platform, and what evidence from other fields shortens the path.",
    ambition: "Turn a single liver therapy into a radiation platform that reaches new tumours, including the brain." },
  "Neuromodulation": { priority: "P1",
    angle: "The contest is moving from the device that delivers the pulse to the sensing and the data that tune the therapy to each patient. Hardware is closer to parity, so the advantage lives in the data layer.",
    wedge: "Where sensing led therapy borrows from outside the nerve field, and who is ahead on the data.",
    ambition: "Compete on the data and sensing that personalise therapy, not on the pulse generator alone." },
  "WATCHMAN and Structural Heart": { priority: "P1",
    angle: "Growth here is less about the device and more about finding the patients. Most of the people who could benefit are never identified, so the limit is the referral path, not the competition.",
    wedge: "Which patient finding methods from other fields could release the large group of patients who are never diagnosed.",
    ambition: "Hold the clear lead in heart appendage closure and grow it by finding the patients who are never diagnosed." },
  "Neurovascular and Penumbra": { priority: "P1",
    angle: "This is a return to a field the company left in 2011, against a rival that bought the original business. The first 2 years are about integration and winning back routine use, not about heritage.",
    wedge: "What the return signals about where value was left behind, and which nearby signals lower the risk of the integration.",
    ambition: "Re enter the brain blood vessel field and win back routine use from the rival that bought the old business." },
  "Corporate R&D": { priority: "P2",
    angle: "The centre holds only the shared technologies. The honest offer is help ranking opportunities across divisions and reading the competition, nothing a single division already owns.",
    wedge: "Which shared technology bets deserve money next, judged on outside evidence rather than internal lobbying.",
    ambition: "Place the shared technology bets that cut across divisions, judged on outside evidence." },
  "Open Innovation": { priority: "Beyond P3",
    angle: "Lower priority. Companies now publish their needs and startups reach them directly, so the broker role has thinned.",
    wedge: "Engage only if they come to us.", ambition: "Not a focus." },
};

/* ============================================================
   Seeded account intelligence. Figures are an indicative baseline
   and must be confirmed with a live refresh before external use.
   Where a figure is not publicly disclosed, it is marked as such.
   ============================================================ */

/* ============================================================
   Helpers
   ============================================================ */
function firstNameOf(name) {
  if (!name) return "there";
  const n = String(name).trim().split(/\s+/)[0];
  return n.replace(/[^A-Za-z'-]/g, "") || "there";
}
function sanitize(t) {
  if (t == null) return "";
  const NUM_WORDS = { "thirty minutes": "30 minutes", "thirty": "30", "twenty": "20", "forty": "40", "fifty": "50", "sixty": "60", "seventy": "70", "eighty": "80", "ninety": "90", "one hundred and eighty": "180", "one hundred eighty": "180", "one hundred": "100" };
  let s = String(t)
    .replace(/\u2014/g, ", ").replace(/\u2013/g, "-")
    .replace(/[\u2192\u21d2\u2794\u2799\u279c\u2190\u2191\u2193]/g, " ").replace(/->|=>/g, " ")
    .replace(/[\u2018\u2019]/g, "'").replace(/[\u201c\u201d]/g, '"')
    .replace(/[\u2022\u25aa\u25cf\u2043]/g, "")
    .replace(/\bR\s+and\s+D\b/gi, "R&D")
    .replace(/ {2,}/g, " ").replace(/ +\n/g, "\n").trim();
  for (const [word, digit] of Object.entries(NUM_WORDS)) s = s.replace(new RegExp("\\b" + word + "\\b", "gi"), digit);
  return s;
}
const wc = (t) => (t ? String(t).trim().split(/\s+/).filter(Boolean).length : 0);
function extractJSON(text) {
  if (!text) return null;
  let c = text.replace(/```json/gi, "").replace(/```/g, "").trim();
  try { return JSON.parse(c); } catch (e) {}
  const s = c.indexOf("{"), e = c.lastIndexOf("}");
  if (s !== -1 && e > s) { try { return JSON.parse(c.slice(s, e + 1)); } catch (er) {} }
  return null;
}

/* ============================================================
   Service calls
   ============================================================ */
async function callClaude({ system, user, model, apiKey, useSearch = false, maxTokens = 4000, onRetry }) {
  if (!apiKey) throw new Error("No Anthropic key set. Open Settings and add it.");
  const headers = { "content-type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" };
  const body = { model: model || DEFAULT_MODEL, max_tokens: maxTokens, system, messages: [{ role: "user", content: user }] };
  if (useSearch) body.tools = [{ type: "web_search_20250305", name: "web_search" }];
  const MAX_TRIES = 4;
  const WAITS = [8000, 18000, 35000]; // ms between retries: 8s, 18s, 35s
  for (let attempt = 0; attempt < MAX_TRIES; attempt++) {
    let res;
    try { res = await fetch("https://api.anthropic.com/v1/messages", { method: "POST", headers, body: JSON.stringify(body) }); }
    catch (e) { throw new Error("Could not reach the model. Check the network and the key."); }
    let data; try { data = await res.json(); } catch (e) { throw new Error("The model returned an unreadable response."); }
    if (res.ok && !data.error) {
      return (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n").trim();
    }
    if (res.status === 401) throw new Error("The Anthropic key was rejected. Check it in Settings.");
    if (res.status === 429) throw new Error("Rate limit reached. Wait a moment and try again.");
    const overloaded = res.status === 529 || (data && data.error && data.error.type === "overloaded_error");
    if (overloaded && attempt < MAX_TRIES - 1) {
      const wait = WAITS[attempt];
      if (onRetry) onRetry(attempt + 1, Math.round(wait / 1000));
      await new Promise(r => setTimeout(r, wait));
      continue;
    }
    throw new Error((data && data.error && data.error.message) || ("Request failed, status " + res.status));
  }
}

function proxied(proxyUrl, target) { return proxyUrl ? (proxyUrl.replace(/\/$/, "") + "?url=" + encodeURIComponent(target)) : target; }

/* People Data Labs, through the proxy. Used to find and verify the person in a
   role, and to confirm a known contact's current title. Returns a plain object. */
async function pdlSearchRole({ keywords, settings }) {
  if (!settings.pdlKey) return { found: false, message: "Add a People Data Labs key in Settings." };
  if (!settings.proxyUrl) return { found: false, message: "People Data Labs needs a proxy address in Settings. It cannot be called straight from a browser. The README has a one file proxy you can deploy free." };
  const sql = "SELECT * FROM person WHERE job_company_name='boston scientific' AND job_title LIKE '%" + String(keywords).replace(/'/g, "") + "%'";
  const url = proxied(settings.proxyUrl, "https://api.peopledatalabs.com/v5/person/search");
  let res;
  try { res = await fetch(url, { method: "POST", headers: { "content-type": "application/json", "x-api-key": settings.pdlKey }, body: JSON.stringify({ sql, size: 1, pretty: false }) }); }
  catch (e) { return { found: false, message: "Could not reach People Data Labs. Check the proxy address." }; }
  let data; try { data = await res.json(); } catch (e) { return { found: false, message: "People Data Labs returned an unreadable response." }; }
  if (res.status === 401 || res.status === 403) return { found: false, message: "The People Data Labs key was rejected. Check it in Settings." };
  const rec = data && data.data && data.data[0];
  if (!rec) return { found: false, message: "No confident match found for this role. Try a HubSpot pull or refine the role." };
  return { found: true, name: rec.full_name ? rec.full_name.replace(/\b\w/g, c => c.toUpperCase()) : "Name withheld", title: rec.job_title || "", linkedin: rec.linkedin_url ? ("https://" + rec.linkedin_url.replace(/^https?:\/\//, "")) : "", confidence: data.likelihood || "" };
}
async function pdlEnrichPerson({ name, settings }) {
  if (!settings.pdlKey) return { found: false, message: "Add a People Data Labs key in Settings." };
  if (!settings.proxyUrl) return { found: false, message: "People Data Labs needs a proxy address in Settings. It cannot be called straight from a browser. The README has a one file proxy you can deploy free." };
  const target = "https://api.peopledatalabs.com/v5/person/enrich?name=" + encodeURIComponent(name) + "&company=boston%20scientific&min_likelihood=4";
  const url = proxied(settings.proxyUrl, target);
  let res;
  try { res = await fetch(url, { method: "GET", headers: { "x-api-key": settings.pdlKey } }); }
  catch (e) { return { found: false, message: "Could not reach People Data Labs." }; }
  let data; try { data = await res.json(); } catch (e) { return { found: false, message: "People Data Labs returned an unreadable response." }; }
  if (res.status === 401 || res.status === 403) return { found: false, message: "The People Data Labs key was rejected." };
  if (res.status === 404 || !data || !data.data) return { found: false, message: "No confident match found." };
  const rec = data.data;
  return { found: true, name: rec.full_name ? rec.full_name.replace(/\b\w/g, c => c.toUpperCase()) : name, title: rec.job_title || "", company: rec.job_company_name || "", linkedin: rec.linkedin_url ? ("https://" + rec.linkedin_url.replace(/^https?:\/\//, "")) : "", confidence: data.likelihood || "" };
}

/* Perplexity audit through the proxy, falls back to Claude when no proxy or key */
async function auditFacts({ claimsText, contact, settings }) {
  const ask = "You are an independent fact checker for a MedTech advisory firm. Check every checkable claim in the text below about " + contact + ". For each claim return a verdict of confirmed, nuanced or unsupported, a confidence from 0 to 100, a one line note, and a source URL where you have one. Return only valid JSON, no markdown: {\"engine\":\"\",\"findings\":[{\"claim\":\"\",\"verdict\":\"confirmed|nuanced|unsupported\",\"confidence\":0,\"note\":\"\",\"source\":\"\"}]}\n\nTEXT:\n" + claimsText;
  if (settings.proxyUrl && settings.perplexityKey) {
    const url = proxied(settings.proxyUrl, "https://api.perplexity.ai/chat/completions");
    let res;
    try {
      res = await fetch(url, { method: "POST", headers: { "content-type": "application/json", "Authorization": "Bearer " + settings.perplexityKey },
        body: JSON.stringify({ model: "sonar-pro", messages: [{ role: "user", content: ask }] }) });
    } catch (e) { throw new Error("Could not reach Perplexity through the proxy."); }
    const data = await res.json();
    if (!res.ok) throw new Error((data && data.error && (data.error.message || data.error)) || ("Perplexity error, status " + res.status));
    const txt = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
    const p = extractJSON(txt) || {};
    return { engine: "Perplexity sonar-pro", findings: p.findings || [] };
  }
  const txt = await callClaude({ system: "You are an independent fact checker. Use web search.", user: ask, model: settings.model, apiKey: settings.apiKey, useSearch: true, maxTokens: 3500 });
  const p = extractJSON(txt) || {};
  return { engine: "Claude with web search", findings: p.findings || [] };
}

/* GitHub Gist, the cloud save for approved emails */
async function gistRequest(token, method, id, payload) {
  const url = "https://api.github.com/gists" + (id ? "/" + id : "");
  const res = await fetch(url, { method, headers: { "Authorization": "Bearer " + token, "Accept": "application/vnd.github+json", "content-type": "application/json" }, body: payload ? JSON.stringify(payload) : undefined });
  const data = await res.json();
  if (!res.ok) throw new Error((data && data.message) || ("GitHub error, status " + res.status));
  return data;
}

/* ============================================================
   Sign in gate. The person enters their email once on this device.
   The studio remembers them, so they are recognised on every later
   visit without entering anything again. Email is the identity, and
   every edit and approval is recorded against it. A super admin email
   must also answer a security question to switch on the admin layer.
   ============================================================ */
function SignIn({ onSignIn }) {
  const [email, setEmail] = React.useState("");
  const [stage, setStage] = React.useState("email"); // "email" | "secq"
  const [answer, setAnswer] = React.useState("");
  const [err, setErr] = React.useState("");
  const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim());

  const proceed = () => {
    const e = email.trim().toLowerCase();
    if (!valid) { setErr("Enter a valid email address."); return; }
    setErr("");
    if (SUPERADMINS.includes(e)) { setStage("secq"); return; }
    onSignIn(e, false);
  };
  const checkAnswer = () => {
    if (hashStr(answer) === ANSWER_HASH) { onSignIn(email.trim().toLowerCase(), true); }
    else { setErr("That answer does not match. You can continue as a standard user instead."); }
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
      <div style={{ width: "100%", maxWidth: 430 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
          <Mark size={36} />
          <div><div className="eyebrow">FutureBridge, Life Sciences and MedTech</div><h1 className="title" style={{ fontSize: 19 }}>Account Studio</h1></div>
        </div>
        <div className="card"><div className="body">
          {stage === "email" ? (
            <>
              <p className="lead" style={{ margin: "0 0 16px" }}>Enter your work email to continue. This device will remember you, so you will not need to enter it again here. Every edit and approval is recorded against your email.</p>
              <label className="lab">Email address</label>
              <div style={{ display: "flex", gap: 8 }}>
                <input className="f" style={{ flex: 1 }} type="email" placeholder="you@futurebridge.com" value={email} onChange={e => { setEmail(e.target.value); setErr(""); }} onKeyDown={e => { if (e.key === "Enter") proceed(); }} autoFocus />
                <button className="btn primary" disabled={!valid} onClick={proceed}>Continue</button>
              </div>
              {err ? <p className="note" style={{ color: "var(--red)", margin: "10px 0 0" }}>{err}</p> : null}
            </>
          ) : (
            <>
              <p className="lead" style={{ margin: "0 0 6px" }}>This email has admin rights. Answer the security question to switch on the admin layer.</p>
              <p className="tiny" style={{ margin: "0 0 16px" }}>Signing in as {email.trim().toLowerCase()}</p>
              <label className="lab">{SECURITY_QUESTION}</label>
              <div style={{ display: "flex", gap: 8 }}>
                <input className="f" style={{ flex: 1 }} type="password" placeholder="Your answer" value={answer} onChange={e => { setAnswer(e.target.value); setErr(""); }} onKeyDown={e => { if (e.key === "Enter") checkAnswer(); }} autoFocus />
                <button className="btn primary" disabled={!answer.trim()} onClick={checkAnswer}>Unlock admin</button>
              </div>
              {err ? <p className="note" style={{ color: "var(--red)", margin: "10px 0 0" }}>{err}</p> : null}
              <div style={{ marginTop: 12, display: "flex", gap: 8 }}>
                <button className="btn sm" onClick={() => onSignIn(email.trim().toLowerCase(), false)}>Continue as standard user</button>
                <button className="btn sm" onClick={() => { setStage("email"); setAnswer(""); setErr(""); }}>Use a different email</button>
              </div>
            </>
          )}
        </div></div>
        <p className="tiny" style={{ textAlign: "center", marginTop: 14, color: "var(--faint)" }}>Standard users sign in with email alone. The admin layer is reserved.</p>
      </div>
    </div>
  );
}

    ["Sustainability leaders", "Circularity, decarbonisation, alternative materials, policy shifts and transition pathways."],
  ];
  const steps = [
    ["The opening signal", "One uncommon, current observation relevant to the reader's mandate. Not a compliment, not a summary of their business, and never a fact they already own."],
    ["The opportunity area", "One or two whitespace or market signals where an outside view helps, framed as worth exploring, in measured language, not as conclusions about their business."],
    ["The capability anchor", "The signal and opportunity sit inside what FutureBridge actually does. The studio matches the reader's role to the right anchor, shown below, and brings the Life Sciences and MedTech sector lens."],
    ["The credibility line", "One short line that FutureBridge works with their peers and leading players in adjacent spaces, with no unapproved names and no unsupported claims."],
    ["The meeting ask", "A confident thirty minute ask, framed as us sharing what we are seeing across their peers and adjacent industries and what it may mean for them. Never framed as comparing notes, and never implying the reader must prepare anything."],
    ["The guardrails", "Plain English, sentence case, no marketing or preachy or AI sounding lines, R&D with an ampersand, numbers in digits, the greeting Hi and the close Warm regards, the email near 180 words and the LinkedIn note 70 to 100 words."],
  ];
  return (
    <div>
      <p className="lead">How the studio writes each email. The aim is one senior advisor writing to another, anchored to what FutureBridge does, never generic outreach.</p>
      <div className="card"><div className="cap">The shape of every email</div><div className="body">
        {steps.map(([h, b], i) => <div className="ibul" key={i}><span className="dot" /><p><strong>{h}.</strong> {b}</p></div>)}
      </div></div>
      <div className="card"><div className="cap">How the angle is matched to the reader</div><div className="body">
        <p className="note" style={{ margin: "0 0 12px" }}>The studio reads the contact's role and division, then anchors the email to the capability area that leader would care about and act on.</p>
        <div className="tblwrap"><table className="tbl"><thead><tr><th>If the reader is in</th><th>The email anchors on</th></tr></thead>
          <tbody>{anchors.map((a, i) => <tr key={i}><td>{a[0]}</td><td>{a[1]}</td></tr>)}</tbody></table></div>
      </div></div>
      <div className="card"><div className="cap">What the studio will not do</div><div className="body">
        <p className="note" style={{ margin: 0 }}>It will never anchor on CRM, lead generation, marketing, sales tooling, websites, software platforms, IT services or generic digital transformation. If the only visible signal points there, the studio chooses a different signal that fits a FutureBridge capability instead.</p>
      </div></div>
    </div>
  );
}

/* ============================================================
   Admin. The complete action log. A super admin sees and manages
   everything. A standard user sees only their own actions. A super
   admin email that has not unlocked can unlock here.
   ============================================================ */
function AdminView({ currentUser, isSuperAdmin, isSuperAdminEmail, adminUnlocked, setAdminUnlocked, audit, setAudit, logAudit, flash }) {
  const [filter, setFilter] = React.useState("");
  const [answer, setAnswer] = React.useState("");
  const [err, setErr] = React.useState("");
  const shown = audit.filter(a => !filter || (a.who || "").toLowerCase().includes(filter.toLowerCase()) || (a.type || "").toLowerCase().includes(filter.toLowerCase()) || (a.detail || "").toLowerCase().includes(filter.toLowerCase()));
  const people = Array.from(new Set(audit.map(a => a.who).filter(Boolean)));

  const exportCsv = () => {
    const head = "time,who,type,detail\n";
    const body = audit.map(a => [a.time, a.who || "", a.type, (a.detail || "").replace(/"/g, "'")].map(x => '"' + x + '"').join(",")).join("\n");
    const blob = new Blob([head + body], { type: "text/csv" }); const url = URL.createObjectURL(blob);
    const link = document.createElement("a"); link.href = url; link.download = "futurebridge-audit-log.csv"; link.click(); URL.revokeObjectURL(url);
  };

  if (!isSuperAdmin) {
    return (
      <div>
        <p className="lead">Your record of actions in the studio. Every edit, draft and approval you make is logged against your email.</p>
        {isSuperAdminEmail && !adminUnlocked ? (
          <div className="card" style={{ borderLeft: "3px solid var(--red)" }}><div className="body">
            <strong>Admin layer locked.</strong>
            <p className="note" style={{ margin: "6px 0 10px" }}>This email has admin rights. Answer the security question to switch on the full log and controls on this device.</p>
            <label className="lab">{SECURITY_QUESTION}</label>
            <div style={{ display: "flex", gap: 8, maxWidth: 420 }}>
              <input className="f" style={{ flex: 1 }} type="password" value={answer} onChange={e => { setAnswer(e.target.value); setErr(""); }} onKeyDown={e => { if (e.key === "Enter" && answer.trim()) { if (hashStr(answer) === ANSWER_HASH) { setAdminUnlocked(true); logAudit("Admin layer unlocked", currentUser, []); flash("Admin layer on."); } else setErr("That answer does not match."); } }} />
              <button className="btn primary" disabled={!answer.trim()} onClick={() => { if (hashStr(answer) === ANSWER_HASH) { setAdminUnlocked(true); logAudit("Admin layer unlocked", currentUser, []); flash("Admin layer on."); } else setErr("That answer does not match."); }}>Unlock</button>
            </div>
            {err ? <p className="note" style={{ color: "var(--red)", margin: "10px 0 0" }}>{err}</p> : null}
          </div></div>
        ) : null}
        <div className="card"><div className="cap">My recent actions</div><div className="body">
          {audit.filter(a => a.who === currentUser).slice(0, 60).map((a, i) => (
            <div key={i} style={{ display: "flex", gap: 12, padding: "7px 0", borderBottom: "1px solid var(--hair)", fontSize: 13 }}>
              <span className="tiny" style={{ minWidth: 96 }}>{a.time}</span><span style={{ fontWeight: 600, minWidth: 150 }}>{a.type}</span><span style={{ color: "var(--ink-2)" }}>{a.detail}</span>
            </div>
          ))}
          {!audit.some(a => a.who === currentUser) ? <p className="note" style={{ margin: 0 }}>No actions recorded yet.</p> : null}
        </div></div>
      </div>
    );
  }

  return (
    <div>
      <p className="lead">The complete action log across the team. Every edit, draft and approval is recorded against the person's email. As admin you can filter, export and clear it, and override where needed.</p>

      <div className="card"><div className="cap">Who has been active</div><div className="body">
        {people.length ? (
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {people.map((p, i) => {
              const count = audit.filter(a => a.who === p).length;
              return <button key={i} className="btn sm" onClick={() => setFilter(p === filter ? "" : p)} style={filter === p ? { borderColor: "var(--ink)", fontWeight: 700 } : {}}>{p} <span className="tiny" style={{ marginLeft: 4 }}>{count}</span></button>;
            })}
          </div>
        ) : <p className="note" style={{ margin: 0 }}>No activity recorded yet.</p>}
      </div></div>

      <div className="card"><div className="cap" style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
        Complete action log, {audit.length} entries
        <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
          <input className="f" style={{ width: 200, fontWeight: 400 }} placeholder="Filter by person or action" value={filter} onChange={e => setFilter(e.target.value)} />
          <button className="btn sm" style={{ fontWeight: 400 }} onClick={exportCsv}>Export CSV</button>
          <button className="btn sm" style={{ fontWeight: 400 }} onClick={() => { if (confirm("Clear the entire action log? This cannot be undone.")) { setAudit([]); } }}>Clear log</button>
        </div>
      </div><div className="body">
        {shown.length ? shown.map((a, i) => (
          <div key={i} style={{ display: "flex", gap: 12, padding: "7px 0", borderBottom: "1px solid var(--hair)", fontSize: 13, alignItems: "baseline" }}>
            <span className="tiny" style={{ minWidth: 96 }}>{a.time}</span>
            <span className="pill" style={{ minWidth: 150, background: "#EAF0FB", color: "#2A52A0", overflow: "hidden", textOverflow: "ellipsis" }}>{a.who || "Unknown"}</span>
            <span style={{ fontWeight: 600, minWidth: 150 }}>{a.type}</span>
            <span style={{ color: "var(--ink-2)", flex: 1 }}>{a.detail}{a.sources && a.sources.length ? <span className="tiny" style={{ marginLeft: 6 }}>{a.sources.length} source{a.sources.length > 1 ? "s" : ""}</span> : null}</span>
          </div>
        )) : <p className="note" style={{ margin: 0 }}>No matching entries.</p>}
      </div></div>
    </div>
  );
}

/* ============================================================
   App
   ============================================================ */
function App() {
  const [tab, setTab] = useState("intel");
  const [settings, setSettings] = useState(loadSettings);
  const [direction, setDirection] = useState(() => { const v = LS.get("fb_direction", ""); return typeof v === "string" ? v : ""; });
  const [intel, setIntel] = useState(loadIntel);
  const [contacts, setContacts] = useState(loadContacts);
  const [approved, setApproved] = useState(() => loadArray("fb_approved"));
  const [audit, setAudit] = useState(() => loadArray("fb_audit"));
  const [cloud, setCloud] = useState(() => LS.get("fb_cloud", { lastSync: "" }));
  const [currentUser, setCurrentUser] = useState(() => { const v = LS.get("fb_current_user", ""); return typeof v === "string" ? v : ""; });
  const [adminUnlocked, setAdminUnlocked] = useState(() => LS.get("fb_admin_unlocked", false) === true);
  const [toast, setToast] = useState("");
  const [drawer, setDrawer] = useState(null); // null or {scope:'global'|contactId, title}
  const [globalChat, setGlobalChat] = useState([]);
  const [targetHits, setTargetHits] = useState(() => LS.get("fb_target_hits", {}));
  const [pdlBusy, setPdlBusy] = useState("");
  const [contextBusy, setContextBusy] = useState(false);
  useEffect(() => LS.set("fb_target_hits", targetHits), [targetHits]);

  /* Push one or all targets from Intelligence to Contacts as Recommended */
  const pushTargets = (indexOrAll) => {
    const targets = intel.targets || [];
    const toPush = typeof indexOrAll === "number" ? [targets[indexOrAll]].filter(Boolean) : targets;
    if (!toPush.length) { flash("No targets to push."); return; }
    setContacts(prev => {
      const existing = new Set(prev.map(c => (c.name || "").toLowerCase().trim()));
      const hit = typeof indexOrAll === "number" ? targetHits[indexOrAll] : null;
      const newOnes = toPush.map((t, i) => {
        const pdlHit = typeof indexOrAll === "number" ? hit : targetHits[i];
        const name = pdlHit && pdlHit.found ? pdlHit.name : "";
        const title = pdlHit && pdlHit.found ? (pdlHit.title || t.role) : t.role;
        const key = name.toLowerCase().trim();
        if (key && existing.has(key)) return null;
        return { id: "tgt_" + Date.now() + "_" + i, name, title, division: t.division || "Electrophysiology", email: "", linkedin: pdlHit && pdlHit.found ? (pdlHit.linkedin || "") : "", region: "", status: "new", summary: t.opportunity || "", signals: [], pains: [], draft: null, chat: [], tag: "Recommended Contact", sourceRole: t.role };
      }).filter(Boolean);
      if (!newOnes.length) { flash("All selected targets are already in Contacts."); return prev; }
      flash(newOnes.length + " target" + (newOnes.length > 1 ? "s" : "") + " added to Contacts as Recommended.");
      return [...prev, ...newOnes];
    });
    setTab("contacts");
  };

  /* Add further context to the intel object (file or URL) */
  const addContext = (action) => {
    if (action.type === "remove") {
      setIntel(prev => ({ ...prev, contextFiles: (prev.contextFiles || []).filter((_, i) => i !== action.index) }));
      return;
    }
    if (action.type === "remove-url") {
      setIntel(prev => ({ ...prev, contextUrls: (prev.contextUrls || []).filter((_, i) => i !== action.index) }));
      return;
    }
    if (action.type === "file") {
      setIntel(prev => ({ ...prev, contextFiles: [...(prev.contextFiles || []), { name: action.name, content: action.content }] }));
      flash("Context file added. It will be used on the next refresh and in drafts.");
      return;
    }
    if (action.type === "url") {
      setContextBusy(true);
      setIntel(prev => ({ ...prev, contextUrls: [...(prev.contextUrls || []), action.url] }));
      flash("Link saved. It will be used on the next refresh and in drafts.");
      setContextBusy(false);
    }
  };

  useEffect(() => LS.set("fb_settings", settings), [settings]);
  useEffect(() => LS.set("fb_direction", direction), [direction]);
  useEffect(() => LS.set("fb_intel", intel), [intel]);
  useEffect(() => LS.set("fb_contacts", contacts), [contacts]);
  useEffect(() => LS.set("fb_approved", approved), [approved]);
  useEffect(() => LS.set("fb_audit", audit), [audit]);
  useEffect(() => LS.set("fb_cloud", cloud), [cloud]);
  useEffect(() => LS.set("fb_current_user", currentUser), [currentUser]);
  useEffect(() => LS.set("fb_admin_unlocked", adminUnlocked), [adminUnlocked]);

  const isSuperAdmin = SUPERADMINS.includes((currentUser || "").toLowerCase().trim()) && adminUnlocked;
  const isSuperAdminEmail = SUPERADMINS.includes((currentUser || "").toLowerCase().trim());

  const flash = (m) => { setToast(m); setTimeout(() => setToast(""), 2800); };
  const logAudit = (type, detail, sources) => setAudit(prev => [{ time: new Date().toISOString().slice(0, 16).replace("T", " "), who: currentUser || "Unknown", type, detail, sources: sources || [] }, ...prev].slice(0, 600));
  const setContact = (id, patch) => setContacts(prev => prev.map(c => c.id === id ? { ...c, ...(typeof patch === "function" ? patch(c) : patch) } : c));
  const keySet = !!settings.apiKey;
  const pdlReady = !!(settings.proxyUrl && settings.pdlKey);
  const pdlKeySet = !!settings.pdlKey;
  const perplexityReady = !!(settings.proxyUrl && settings.perplexityKey);
  const [intelFindings, setIntelFindings] = useState(() => LS.get("fb_intel_findings", {}));
  useEffect(() => LS.set("fb_intel_findings", intelFindings), [intelFindings]);
  const [auditBusy, setAuditBusy] = useState("");

  /* Audit a single intelligence data point with Perplexity, on demand */
  const auditIntelPoint = async (key, claimText) => {
    if (!perplexityReady) { flash("Add the proxy and a Perplexity key in Settings to audit with Perplexity."); return; }
    setAuditBusy("intel:" + key);
    try {
      const r = await auditFacts({ claimsText: claimText, contact: "Boston Scientific", settings });
      setIntelFindings(prev => ({ ...prev, [key]: { engine: r.engine, findings: r.findings || [] } }));
      logAudit("Intelligence audit, " + r.engine, key + ", " + (r.findings ? r.findings.length : 0) + " claims checked", (r.findings || []).map(f => f.source).filter(Boolean));
      flash("Checked with " + r.engine + ".");
    } catch (e) { flash("Audit failed. " + (e.message || "")); }
    finally { setAuditBusy(""); }
  };

  const verifyTarget = async (i) => {
    const t = intel.targets[i]; if (!t) return;
    setPdlBusy("t" + i);
    try {
      const kw = (t.division || t.role || "").toLowerCase();
      const res = await pdlSearchRole({ keywords: kw, settings });
      setTargetHits(prev => ({ ...prev, [i]: res }));
      logAudit("PDL role lookup", t.role + (res.found ? ", matched " + res.name : ", no confident match"), []);
      if (!res.found && res.message) flash(res.message);
    } catch (e) { flash("Verify failed. " + (e.message || "")); }
    finally { setPdlBusy(""); }
  };

  const verifyContact = async (id) => {
    const c = contacts.find(x => x.id === id); if (!c || !c.name) { flash("Add a name first."); return; }
    setPdlBusy("c" + id);
    try {
      const res = await pdlEnrichPerson({ name: c.name, settings });
      if (res.found) {
        const stillHere = (res.company || "").toLowerCase().indexOf("boston scientific") !== -1;
        setContact(id, { title: res.title || c.title, status: stillHere ? "verified" : "unclear", pdl: { title: res.title, company: res.company, linkedin: res.linkedin, confidence: res.confidence } });
        logAudit("PDL contact verify", c.name + ", " + (res.title || "no title") + (stillHere ? "" : ", company differs"), []);
        flash(stillHere ? "Verified against People Data Labs." : "Found, but the company on file differs. Marked for review.");
      } else { flash(res.message || "No confident match found."); }
    } catch (e) { flash("Verify failed. " + (e.message || "")); }
    finally { setPdlBusy(""); }
  };

  /* pull approved from the cloud on first load if configured */
  useEffect(() => {
    (async () => {
      if (settings.githubToken && settings.gistId) {
        try {
          const g = await gistRequest(settings.githubToken, "GET", settings.gistId);
          const file = g.files && g.files["approved.json"];
          if (file && file.content) {
            const data = JSON.parse(file.content);
            if (Array.isArray(data.items)) { setApproved(data.items); setCloud({ lastSync: data.savedAt || "" }); }
          }
        } catch (e) { /* stay on local copy */ }
      }
    })();
  // eslint-disable-next-line
  }, []);

  const intelDigest = () => {
    const n = intel.narrative.map(s => s.title + ". " + s.summary).join("\n");
    const strat = "Corporate direction: " + intel.strategy.corporate.join(" ");
    return n + "\n" + strat;
  };

  /* ---------------- Intelligence refresh ---------------- */
  const [refreshing, setRefreshing] = useState(false);
  const refreshIntel = async () => {
    setRefreshing(true);
    try {
      const system = [
        "You refresh an account brief on Boston Scientific. Use web search. Put a real source URL on every figure. Write plain English, short sentences, no jargon, no em dashes, no arrows, sentence case.",
        "Return only valid JSON with this exact shape, filling real, sourced numbers where public, and the words not disclosed where a figure is not public:",
        "{\"stamp\":\"Refreshed, with the date\",\"narrative\":[{\"id\":\"\",\"title\":\"a plain conclusion as the heading\",\"summary\":\"two plain sentences\",\"detail\":\"a short plain paragraph\",\"source\":\"https://...\"}],\"financials\":{\"note\":\"\",\"columns\":[\"FY2023\",\"FY2024\",\"FY2025\"],\"rows\":[{\"metric\":\"Net sales, USD millions\",\"cells\":[\"\",\"\",\"\"]}]},\"market\":{\"note\":\"\",\"leader\":[{\"area\":\"\",\"bsx\":\"\",\"next\":\"\"}],\"laggard\":[{\"area\":\"\",\"leaders\":\"\",\"bsx\":\"\",\"note\":\"\"}]},\"strategy\":{\"corporate\":[\"\"]}}",
      ].join("\n");
      const text = await callClaude({ system, user: "Refresh the Boston Scientific brief now. Today is " + new Date().toDateString() + ". Include full year 2025 if it has been reported.", model: settings.model, apiKey: settings.apiKey, useSearch: true, maxTokens: 8000,
        onRetry: (n, secs) => flash("Refresh API busy, retrying in " + secs + "s (attempt " + n + " of 3)...")
      });
      const p = extractJSON(text);
      if (p) {
        setIntel(prev => ({
          ...prev,
          stamp: sanitize(p.stamp || ("Refreshed " + new Date().toDateString())),
          narrative: (p.narrative && p.narrative.length) ? p.narrative.map((s, i) => ({ id: s.id || ("n" + i), title: sanitize(s.title), summary: sanitize(s.summary || ""), detail: sanitize(s.detail || ""), source: s.source || "" })) : prev.narrative,
          financials: (p.financials && p.financials.rows) ? { note: sanitize(p.financials.note || prev.financials.note), columns: p.financials.columns || prev.financials.columns, rows: p.financials.rows.map(r => ({ metric: sanitize(r.metric), cells: (r.cells || []).map(x => sanitize(String(x))) })) } : prev.financials,
          market: (p.market && (p.market.leader || p.market.laggard)) ? { note: sanitize(p.market.note || prev.market.note), leader: (p.market.leader || prev.market.leader).map(l => ({ area: sanitize(l.area), bsx: sanitize(l.bsx || ""), next: sanitize(l.next || "") })), laggard: (p.market.laggard || prev.market.laggard).map(l => ({ area: sanitize(l.area), leaders: sanitize(l.leaders || ""), bsx: sanitize(l.bsx || ""), note: sanitize(l.note || "") })) } : prev.market,
          strategy: (p.strategy && p.strategy.corporate) ? { corporate: p.strategy.corporate.map(sanitize) } : prev.strategy,
        }));
        const srcs = (p.narrative || []).map(s => s.source).filter(Boolean);
        logAudit("Intelligence refresh", "Account brief rebuilt from live sources", srcs);
        flash("Intelligence refreshed from live sources.");
      } else flash("Refresh returned an unexpected shape. Baseline kept.");
    } catch (e) { flash(e.message || "Refresh failed."); }
    finally { setRefreshing(false); }
  };

  /* ---------------- Contact upload and HubSpot pull ---------------- */
  const fileRef = useRef(null);
  const mapRows = (rows) => rows.map((r, i) => {
    const get = (...keys) => { for (const k of keys) { const hit = Object.keys(r).find(c => c.toLowerCase().replace(/[^a-z]/g, "").includes(k)); if (hit && r[hit]) return String(r[hit]).trim(); } return ""; };
    const first = get("firstname", "first"), last = get("lastname", "last");
    const name = get("fullname", "name", "contact") || (first + " " + last).trim();
    if (!name) return null;
    let division = get("division", "segment", "businessunit", "function"); if (!DIVISIONS[division]) division = "Electrophysiology";
    return { id: "c_" + Date.now() + "_" + i, name, title: get("designation", "title", "role", "jobtitle"), division, email: get("email", "mail"), linkedin: get("linkedin", "profile", "url"), region: get("region", "location", "country"), status: "new", summary: "", signals: [], pains: [], draft: null, chat: [] };
  }).filter(Boolean);

  const handleFile = (file) => {
    const finish = (rows) => { const m = mapRows(rows); if (!m.length) { flash("No usable rows found. Check the column headings."); return; } setContacts(prev => [...prev, ...m]); flash(m.length + " contacts loaded."); };
    const ext = file.name.split(".").pop().toLowerCase();
    if (ext === "csv") Papa.parse(file, { header: true, skipEmptyLines: true, complete: r => finish(r.data) });
    else { const rd = new FileReader(); rd.onload = (e) => { try { const wb = XLSX.read(new Uint8Array(e.target.result), { type: "array" }); finish(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" })); } catch (er) { flash("Could not read that file."); } }; rd.readAsArrayBuffer(file); }
  };

  const [hsPulling, setHsPulling] = useState(false);
  const pullFromHubSpot = async () => {
    if (!settings.hubspotToken) { flash("Add a HubSpot token in Settings first."); return; }
    if (!settings.proxyUrl) { flash("HubSpot blocks browser calls. Set a proxy URL in Settings, or import a CSV."); return; }
    setHsPulling(true);
    try {
      const url = proxied(settings.proxyUrl, "https://api.hubapi.com/crm/v3/objects/contacts?limit=50&properties=firstname,lastname,email,jobtitle,company");
      const res = await fetch(url, { headers: { "Authorization": "Bearer " + settings.hubspotToken } });
      const data = await res.json();
      if (!res.ok) throw new Error((data && data.message) || ("HubSpot error, status " + res.status));
      const rows = (data.results || []).map(o => ({ FirstName: o.properties.firstname, LastName: o.properties.lastname, Email: o.properties.email, Title: o.properties.jobtitle }));
      const m = mapRows(rows);
      setContacts(prev => [...prev, ...m]);
      logAudit("HubSpot pull", m.length + " contacts pulled", []);
      flash(m.length + " contacts pulled from HubSpot.");
    } catch (e) { flash("HubSpot pull failed. " + (e.message || "")); }
    finally { setHsPulling(false); }
  };

  const addManual = (form) => {
    const f = form || {};
    setContacts(prev => [...prev, { id: "c_" + Date.now(), name: f.name || "", title: f.title || "", division: f.division || "Electrophysiology", email: f.email || "", linkedin: f.linkedin || "", region: f.region || "", company: f.company || "Boston Scientific", status: "new", summary: "", signals: [], pains: [], draft: null, chat: [] }]);
  };

  /* ---------------- Verify and research ---------------- */
  const research = async (id) => {
    const c = contacts.find(x => x.id === id); if (!c) return;
    if (!c.name.trim()) { flash("Add a name first."); return; }
    setContact(id, { status: "researching" });
    try {
      const system = [
        "You research a single named person for a MedTech advisory firm. Use web search. Be honest about gaps and never invent a quote, a statement or a source.",
        "Step one. Check the person currently holds a role at Boston Scientific. If trusted sources show they have left, stop and report that.",
        "Step two. If current, correct the title and division if the sources show a change.",
        "Step three. Gather public signals from the last six to twelve months. Talks, interviews, articles, posts, patents, or visible division focus. Paraphrase, never long quotes, with a source and a month.",

        "",
        "MATCH THE ANCHOR TO THE READER'S MANDATE. For a strategy or transformation leader, anchor on market foresight, disruption monitoring, adjacency growth, competitive movement and scenario based choices. For an R&D, science or technology leader, anchor on emerging science, technology landscapes, application scouting, IP intelligence and innovation portfolio prioritisation. For an innovation leader, anchor on innovation scanning, adoption pathways, technology roadmaps and white space mapping. For a business unit, category or commercial or growth leader, anchor on demand spaces, market white space, opportunity sizing, category reinvention, competitor movement and growth thesis. For a supply chain, procurement or operations leader, anchor on supplier ecosystems, resilience, raw material shifts, localisation, value chain risk and alternative sourcing. For a sustainability leader, anchor on circularity, decarbonisation, alternative materials, policy shifts and transition pathways. Bring the relevant sector lens, for Boston Scientific that is Life Sciences and MedTech.",
        "",
        "NEVER position FutureBridge as any of these, and never raise these as the angle: CRM, lead generation, appointment setting, digital or performance marketing, website or social, marketing automation or martech, sales enablement tooling, data dashboards, generic digital transformation, IT services or any software platform. If the only signal you can find points there, choose a different signal that fits a FutureBridge anchor instead.",

        "",
        "USE THEIR TWO MOST PRESSING AREAS only as the background for the opening signal and the opportunity area. Do not list them back. Let them shape what you choose to raise.",
        "",

        : ((c.summary || "") + (c.signals.length ? ("\n\nResearch signals:\n" + c.signals.map(s => s.text + " (" + (s.source || "no source") + ")").join("\n")) : "") + (c.pains.length ? ("\n\nPressures:\n" + c.pains.map(p => p.pain).join("\n")) : ""));

        "You are the studio assistant inside a Boston Scientific outreach tool built for FutureBridge.",
        "You can do three things. Answer a question plainly. Propose a standing instruction that should apply to every future draft. Rewrite the current email and LinkedIn message when asked, keeping the standard: written like a senior business development leader speaking to a peer, plain and human, no marketing or clever or preachy lines, do not repeat facts the reader already knows, open on one uncommon signal, raise one or two areas worth exploring with measured phrasing, and keep the angle inside what FutureBridge actually does, that is strategic foresight, innovation scanning and roadmapping, growth and market white space, competitive and ecosystem intelligence, technology science and IP intelligence, consumer and category intelligence, sustainability and transition intelligence, supply chain intelligence, or regulation and geopolitical impact, never CRM, marketing, sales tooling, software or generic digital transformation. One short credibility line on FutureBridge working with their peers and leading players. A confident thirty minute ask framed as us sharing what we are seeing across their peers and adjacent industries, never as comparing notes and never implying the reader must prepare anything. The greeting Hi <first name>, the closing Warm regards on the email only, no em dashes, no arrows, sentence case, R&D with an ampersand, numbers in digits, email about 180 words, LinkedIn 70 to 100 words. Do not use these words or phrases: " + FORBIDDEN + ".",

        "Reply in plain English. Then return a single JSON object at the very end, on its own, no markdown: {\"reply\":\"your plain reply\",\"standingRule\":\"a one or two line rule to save, or empty\",\"emailEdit\":{\"subject\":\"\",\"body\":\"\",\"inmail\":\"\"}}. Set emailEdit to null unless you actually rewrote the email.",

      ].join("\n");
      const out = await callClaude({ system, user: text, model: settings.model, apiKey: settings.apiKey, maxTokens: 2000 });
      const p = extractJSON(out) || { reply: out };
      const reply = { role: "assistant", text: sanitize(p.reply || out), standingRule: sanitize(p.standingRule || ""), emailEdit: (p.emailEdit && p.emailEdit.body) ? { subject: sanitize(p.emailEdit.subject || (c && c.draft ? c.draft.email.subject : "")), body: sanitize(p.emailEdit.body), inmail: sanitize(p.emailEdit.inmail || (c && c.draft ? c.draft.inmail.body : "")) } : null, scope };

    const next = [item, ...approved];

    flash("Approved." + (settings.githubToken ? " Saving to the cloud." : ""));
    if (settings.githubToken) syncCloud(next);

  const downloadCSV = () => {
    if (!approved.length) return;
    const rows = approved.map(a => ({ "Contact name": a.name, "Email": a.email, "Title": a.title, "Division": a.division, "Channel": a.channel, "Subject": a.subject, "Message": a.body, "Signed by": a.signedBy, "Approved at": a.approvedAt }));
    const blob = new Blob([Papa.unparse(rows)], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = "futurebridge_bsx_approved.csv"; a.click(); URL.revokeObjectURL(url);
  };

          {tab === "method" ? <MethodView /> : null}

          {tab === "settings" ? <SettingsView settings={settings} setSettings={setSettings} direction={direction} setDirection={setDirection} audit={audit} setAudit={setAudit} isSuperAdmin={isSuperAdmin} /> : null}
        </div></main>

      ) : null}

      {toast ? <div className="toast">{toast}</div> : null}
    </div>
  );
}

    <div className="exp">
      <div className="head" onClick={() => setOpen(!open)}>
        <span className="dot" style={{ width: 7, height: 7, background: "var(--red)", marginTop: 8, flex: "0 0 auto", borderRadius: 1 }} />
        <div><div style={{ fontWeight: 700, fontSize: 14 }}>{title}</div><div style={{ fontSize: 13, color: "var(--ink-2)", marginTop: 2 }}>{summary}</div></div>
        <span className="chev">{open ? "Hide detail" : "Detail"}</span>
      </div>

    </div>
  );
}

/* ---------------- Intelligence ---------------- */
function IntelView({ intel, refreshing, onRefresh, keySet, targetHits, onVerifyTarget, pdlBusy, pdlReady, pdlKeySet, onPushTargets, onAddContext, contextBusy, onAuditIntel, auditBusy, perplexityReady, intelFindings }) {

  const AuditBtn = ({ k, text }) => (

      <button className="btn sm" disabled={!perplexityReady || auditBusy === ("intel:" + k)} onClick={() => onAuditIntel(k, text)} title={perplexityReady ? "Check this with Perplexity Pro" : "Add a Perplexity key and the proxy in Settings"}>

        <p key={i} style={{ margin: "0 0 4px", fontSize: 13 }}>
          <span className="pill" style={{ background: f.verdict === "confirmed" ? "var(--ok-soft)" : f.verdict === "unsupported" ? "#FBEAEA" : "var(--panel)", color: f.verdict === "confirmed" ? "#1B6A45" : f.verdict === "unsupported" ? "#9A2020" : "var(--ink-2)" }}>{f.verdict}</span>
          {" "}{f.claim}<span className="tiny"> {f.note}</span>{f.source ? <a className="src" href={f.source} target="_blank" rel="noreferrer">source</a> : null}

      ))}

  ) : null;

  const handleCtxFile = (e) => {
    const f = e.target.files && e.target.files[0]; if (!f) return;

    reader.onload = (ev) => onAddContext({ type: "file", name: f.name, content: ev.target.result });
    if (f.type === "application/pdf" || f.name.endsWith(".pdf")) reader.readAsDataURL(f);

    e.target.value = "";

  return (
    <div>

        <button className="btn primary" disabled={refreshing || !keySet} onClick={onRefresh}>{refreshing ? <span><span className="spin" />Pulling live sources</span> : "Refresh from live sources"}</button>
      </div>

      <div className="card" style={{ borderLeft: "3px solid var(--red)" }}><div className="cap">Add further context to enrich the intelligence</div><div className="body">
        <p className="note" style={{ margin: "0 0 12px" }}>Upload a document or paste a link, for example an analyst report, an earnings call transcript or a news article. The studio will use it to sharpen the narrative and improve outreach relevance when you next refresh or draft.</p>
        <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
          <button className={"btn sm" + (ctxMode === "file" ? " primary" : "")} onClick={() => setCtxMode("file")}>Upload a file</button>
          <button className={"btn sm" + (ctxMode === "url" ? " primary" : "")} onClick={() => setCtxMode("url")}>Add a link</button>
        </div>
        {ctxMode === "file" ? (
          <div>
            <input ref={fileRef} type="file" accept=".pdf,.txt,.docx,.md,.csv" style={{ display: "none" }} onChange={handleCtxFile} />
            <button className="btn" onClick={() => fileRef.current && fileRef.current.click()} disabled={contextBusy}>
              {contextBusy ? <span><span className="spin" />Processing</span> : "Choose file, PDF, Word, text or CSV"}
            </button>
            {intel.contextFiles && intel.contextFiles.length ? (
              <div style={{ marginTop: 10 }}>
                {intel.contextFiles.map((f, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, fontSize: 13 }}>
                    <span className="pill ok">{f.name}</span>
                    <button className="btn sm" onClick={() => onAddContext({ type: "remove", index: i })}>Remove</button>
                  </div>
                ))}
              </div>
            ) : null}
          </div>
        ) : (
          <div style={{ display: "flex", gap: 8 }}>
            <input className="f" style={{ flex: 1 }} placeholder="https://..." value={ctxUrl} onChange={e => setCtxUrl(e.target.value)} />
            <button className="btn" disabled={!ctxUrl.trim() || contextBusy} onClick={() => { onAddContext({ type: "url", url: ctxUrl.trim() }); setCtxUrl(""); }}>
              {contextBusy ? <span><span className="spin" />Fetching</span> : "Add link"}
            </button>
          </div>
        )}
        {intel.contextUrls && intel.contextUrls.length ? (
          <div style={{ marginTop: 10 }}>
            {intel.contextUrls.map((u, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, fontSize: 13 }}>
                <a className="src" href={u} target="_blank" rel="noreferrer">{u.length > 60 ? u.slice(0, 60) + "..." : u}</a>

              </div>
            ))}
          </div>

      </div></div>

      <div className="card"><div className="cap">What is really going on, click any line for the detail</div><div className="body">
        {intel.narrative.map(s => <Expand key={s.id} title={s.title} summary={s.summary} detail={s.detail} source={s.source} />)}

      </div></div>

      <div className="card"><div className="cap">Company financial performance, full year</div><div className="body">
        <div className="tblwrap"><table className="tbl fin"><thead><tr><th>Metric</th>{intel.financials.columns.map((c, i) => <th key={i} className="num">{c}</th>)}</tr></thead>
          <tbody>{intel.financials.rows.map((r, i) => <tr key={i}><td>{r.metric}</td>{r.cells.map((c, j) => <td key={j} className="num">{c}</td>)}</tr>)}</tbody></table></div>
        <p className="note" style={{ margin: "10px 0 0" }}>{intel.financials.note}</p>
        <AuditBtn k="financials" text={"Boston Scientific full year figures: " + intel.financials.columns.join(", ") + ". " + intel.financials.rows.map(r => r.metric + ": " + r.cells.join(", ")).join(". ")} />
        <AuditOut k="financials" />
      </div></div>

      <div className="card"><div className="cap">Revenue by segment, full year 2025</div><div className="body">
        <div className="tblwrap"><table className="tbl"><thead><tr><th>Segment</th><th className="num">Net sales, USD m</th><th className="num">Share</th><th className="num">Growth vs 2024</th></tr></thead>
          <tbody>{intel.segments.rows.map((r, i) => <tr key={i} className={r.name === "Total" ? "tot" : ""}><td>{r.name}</td><td className="num">{r.rev}</td><td className="num">{r.share}</td><td className="num">{r.growth}</td></tr>)}</tbody></table></div>
        <p className="note" style={{ margin: "10px 0 0" }}>{intel.segments.note}</p>
      </div></div>

      <div className="card"><div className="cap">Business unit detail</div><div className="body">
        <div className="tblwrap"><table className="tbl"><thead><tr><th>Business unit</th><th>Segment</th><th className="num">Q4 2025 net sales, USD m</th><th className="num">FY2025 growth</th></tr></thead>
          <tbody>{intel.units.rows.map((r, i) => <tr key={i}><td>{r.name}</td><td>{r.seg}</td><td className="num">{r.q4}</td><td className="num">{r.growth}</td></tr>)}</tbody></table></div>
        <p className="note" style={{ margin: "10px 0 0" }}>{intel.units.note}</p>
      </div></div>

      <div className="card"><div className="cap">Deals, where the company is buying back ground</div><div className="body">
        <div className="tblwrap"><table className="tbl"><thead><tr><th>When</th><th>Target</th><th>Area</th><th>Status</th><th>Why it matters</th></tr></thead>
          <tbody>{intel.ma.rows.map((r, i) => <tr key={i}><td style={{ whiteSpace: "nowrap" }}>{r.date}</td><td>{r.target}</td><td>{r.area}</td><td style={{ whiteSpace: "nowrap" }}>{r.value}</td><td>{r.why}</td></tr>)}</tbody></table></div>
        <p className="note" style={{ margin: "10px 0 0" }}>{intel.ma.note}</p>
      </div></div>

      <div className="card"><div className="cap">Where the company leads, and where it lags</div><div className="body">
        <p className="tiny" style={{ textTransform: "uppercase", letterSpacing: ".8px", margin: "0 0 6px" }}>Leads</p>
        <div className="tblwrap" style={{ marginBottom: 16 }}><table className="tbl"><thead><tr><th>Area</th><th>Boston Scientific</th><th>The other main players</th></tr></thead>
          <tbody>{intel.market.leader.map((r, i) => <tr key={i}><td>{r.area}</td><td>{r.bsx}</td><td>{r.next}</td></tr>)}</tbody></table></div>
        <p className="tiny" style={{ textTransform: "uppercase", letterSpacing: ".8px", margin: "0 0 6px" }}>Lags</p>
        <div className="tblwrap"><table className="tbl"><thead><tr><th>Area</th><th>Who leads</th><th>Boston Scientific</th><th>Note</th></tr></thead>
          <tbody>{intel.market.laggard.map((r, i) => <tr key={i}><td>{r.area}</td><td>{r.leaders}</td><td>{r.bsx}</td><td>{r.note}</td></tr>)}</tbody></table></div>
        <p className="note" style={{ margin: "10px 0 0" }}>{intel.market.note}</p>

      <div className="card"><div className="cap">Where to aim, the hot targets and why</div><div className="body">
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, flexWrap: "wrap", marginBottom: 14 }}>
          <p className="note" style={{ margin: 0 }}>Roles mapped to the live signals above, each with the opportunity for an outside view and the so what. Use Verify with PDL to find and confirm the person currently in the role, then push all targets to Contacts in one click.</p>
          <button className="btn primary" onClick={onPushTargets}>Push all to Contacts</button>
        </div>
        {intel.targets.map((t, i) => {
          const hit = targetHits[i];
          return (
            <div className="tgt" key={i}>
              <div className="tgt-h">
                <div>
                  <div className="tgt-role">{t.role}</div>
                  <span className="pill" style={{ marginTop: 4 }}>{t.division}</span>
                </div>
                <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
                  <button className="btn sm" disabled={pdlBusy === ("t" + i) || !pdlKeySet} onClick={() => onVerifyTarget(i)} title={pdlKeySet ? (pdlReady ? "" : "People Data Labs also needs a proxy address in Settings") : "Add a People Data Labs key in Settings"}>
                    {pdlBusy === ("t" + i) ? <span><span className="spin" />Verifying</span> : "Verify with PDL"}
                  </button>
                  <button className="btn sm primary" onClick={() => onPushTargets(i)}>Add to Contacts</button>
                </div>
              </div>
              <div className="tgt-grid">
                <div><span className="tgt-k">Why now</span>{t.why}</div>
                <div><span className="tgt-k">The opportunity</span>{t.opportunity}</div>

        {!pdlReady ? <p className="note" style={{ margin: "8px 0 0" }}>To verify, add a People Data Labs key and a proxy address in Settings. Without them the mapping still stands as a guide.</p> : null}
      </div></div>

      <div className="card"><div className="cap">Strategic direction and ambition</div><div className="body">
        <p className="tiny" style={{ textTransform: "uppercase", letterSpacing: ".8px", margin: "0 0 8px" }}>At the company level</p>
        {intel.strategy.corporate.map((s, i) => <div className="ibul" key={i}><span className="dot" /><p>{s}</p></div>)}
        <div style={{ height: 14 }} />
        <p className="tiny" style={{ textTransform: "uppercase", letterSpacing: ".8px", margin: "0 0 8px" }}>At the division level</p>
        {Object.entries(DIVISIONS).filter(([k, v]) => v.priority.indexOf("P3") === -1).map(([k, v]) => (
          <p key={k} style={{ margin: "0 0 6px", fontSize: 13 }}><strong>{k}</strong> <span className={"pri " + (v.priority === "P2" ? "p2" : "")}>({v.priority})</span>. {v.ambition}</p>
        ))}
      </div></div>
    </div>
