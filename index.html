<style>

    --paper:#F7F6F2; --surface:#FFFFFF; --ink:#172A3A; --ink-2:#46586A; --faint:#8B96A1;

  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:1.62;-webkit-font-smoothing:antialiased}

  #boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:var(--paper);z-index:9}

  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 22px}

  .eyebrow{font-size:10.5px;letter-spacing:1.6px;text-transform:uppercase;color:var(--red);font-weight:700}
  h1.title{font-size:17px;font-weight:700;margin:1px 0 0}
  .spacer{margin-left:auto}
  .acct{text-align:right;margin-right:6px}
  .acct .k{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--faint)}
  .acct .v{font-size:13px;font-weight:700}

  nav.tabs{border-bottom:1px solid var(--hair);background:var(--surface);position:sticky;top:0;z-index:5}
  nav.tabs .inner{display:flex;gap:2px;overflow-x:auto}
  nav.tabs button{appearance:none;background:transparent;border:none;cursor:pointer;white-space:nowrap;font:inherit;font-size:13.5px;color:var(--ink-2);padding:13px 14px;border-bottom:3px solid transparent;margin-bottom:-1px}
  nav.tabs button.on{color:var(--ink);font-weight:700;border-bottom-color:var(--red)}
  nav.tabs button:hover{color:var(--ink)}

  main{padding:26px 0 96px}
  .lead{color:var(--ink-2);font-size:14px;max-width:70ch;margin:0 0 20px}

  .btn{appearance:none;font:inherit;font-size:13.5px;cursor:pointer;border-radius:var(--r);border:1px solid var(--hair);background:var(--surface);color:var(--ink);padding:8px 14px;transition:background .12s}
  .btn:hover{background:var(--panel)}
  .btn.primary{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:700}
  .btn.primary:hover{background:#0f2230}
  .btn.red{background:var(--red);border-color:var(--red);color:#fff;font-weight:700}
  .btn.red:hover{background:#bf2017}
  .btn.sm{padding:5px 10px;font-size:12.5px}
  .btn:disabled{opacity:.5;cursor:default}
  .btn:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--red);outline-offset:2px}
  .spin{display:inline-block;width:12px;height:12px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-1px;margin-right:6px}

  .card{background:var(--surface);border:1px solid var(--hair);border-radius:var(--r);margin-bottom:16px}
  .card .cap{padding:11px 16px;border-bottom:1px solid var(--hair);font-size:14px;font-weight:700;background:#FCFBF9;border-radius:var(--r) var(--r) 0 0}
  .card .body{padding:14px 16px}
  .muted{color:var(--ink-2)} .tiny{font-size:12px;color:var(--faint)}

  input.f,select.f,textarea.f{width:100%;font:inherit;font-size:14px;color:var(--ink);background:var(--surface);border:1px solid var(--hair);border-radius:var(--r);padding:9px 11px;outline:none}

  input.f:focus,select.f:focus,textarea.f:focus{border-color:var(--ink-2)}

  .pill.ok{background:var(--ok-soft);color:var(--ok);border-color:#CFE6D9}
  .pill.warn{background:var(--warn-soft);color:var(--warn);border-color:#EBDFC2}
  .pill.bad{background:var(--red-soft);color:var(--red);border-color:#F2CFCC}
  .pri{font-weight:700;color:var(--red)} .pri.p2{color:var(--warn)} .pri.p3{color:var(--faint)}

  .ibul{display:flex;gap:10px;margin:0 0 11px} .ibul:last-child{margin-bottom:0}
  .ibul .dot{width:7px;height:7px;background:var(--red);margin-top:8px;flex:0 0 auto;border-radius:1px}
  .ibul p{margin:0;font-size:14px}
  .src{font-size:11.5px;color:var(--blue);margin-left:6px;text-decoration:underline}

  .exp{border:1px solid var(--hair);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
  .exp .head{display:flex;gap:10px;align-items:flex-start;padding:11px 13px;cursor:pointer;background:var(--surface)}
  .exp .head:hover{background:#FCFBF9}
  .exp .chev{margin-left:auto;color:var(--faint);font-size:12px;flex:0 0 auto;padding-left:8px}
  .exp .detail{padding:0 13px 12px 33px;font-size:13px;color:var(--ink-2);line-height:1.6}

  .tbl{width:100%;border-collapse:collapse;font-size:13px}
  .tbl th,.tbl td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--hair);vertical-align:top}
  .tbl th{font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-2);font-weight:700;background:#FCFBF9}
  .tbl td.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .tbl tr:last-child td{border-bottom:none}
  .tblwrap{overflow-x:auto;border:1px solid var(--hair);border-radius:var(--r)}
  .flag{display:inline-block;font-size:10.5px;color:var(--warn);background:var(--warn-soft);border:1px solid #EBDFC2;border-radius:4px;padding:0 6px;margin-left:6px}

  .cname{font-size:15px;font-weight:700} .ctitle{font-size:12.5px;color:var(--ink-2)}
  .grow{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}

  .mail{border:1px solid var(--hair);border-radius:var(--r);background:var(--surface)}
  .mail .top{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--hair);background:#FCFBF9;flex-wrap:wrap}
  .mail .wc{margin-left:auto;font-size:11px;color:var(--faint)}
  .mail .inner2{padding:14px 16px}
  .mail .subject{font-size:14px;font-weight:700;margin:0 0 10px}
  .mail .text{font-size:14px;line-height:1.7;white-space:pre-wrap;margin:0}
  .mail .sign{margin:14px 0 0;font-size:13px;color:var(--ink-2)}
  .mail .acts{display:flex;gap:8px;padding:11px 14px;border-top:1px solid var(--hair);flex-wrap:wrap}

  .builton{background:var(--panel);border:1px solid var(--hair);border-left:3px solid var(--red);border-radius:var(--r);padding:13px 15px;margin-bottom:14px}
  .builton .k{font-size:10.5px;letter-spacing:.9px;text-transform:uppercase;color:var(--ink-2);margin:0 0 4px}
  .builton .insight{font-size:15px;font-weight:700;margin:0 0 10px}
  .builton ul{margin:0 0 8px;padding-left:18px} .builton li{font-size:13px;margin:0 0 4px}

  .find{font-size:12.5px;padding:9px 11px;border:1px solid var(--hair);border-radius:var(--r);margin-bottom:6px;background:#fff}
  .vc{font-weight:700;margin-right:6px} .vc.confirmed{color:var(--ok)} .vc.nuanced{color:var(--warn)} .vc.unsupported{color:var(--red)} .vc.not_verifiable{color:var(--red)}
  .conf{display:inline-block;width:70px;height:7px;border-radius:4px;background:var(--hair);overflow:hidden;vertical-align:middle;margin:0 6px}
  .conf > i{display:block;height:100%;background:var(--ok)}

  .empty{border:1px dashed var(--hair);border-radius:var(--r);padding:42px 22px;text-align:center;color:var(--ink-2);font-size:14px}
  .note{font-size:12.5px;color:var(--ink-2);line-height:1.55}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px} @media(max-width:680px){.grid2{grid-template-columns:1fr}}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;padding:11px 18px;border-radius:var(--r);z-index:80;box-shadow:0 6px 24px rgba(0,0,0,.18);max-width:90vw}

  .scrim{position:fixed;inset:0;background:rgba(20,30,40,.32);z-index:60}
  .drawer{position:fixed;top:0;right:0;height:100%;width:400px;max-width:92vw;background:var(--surface);border-left:1px solid var(--hair);z-index:70;display:flex;flex-direction:column;box-shadow:-8px 0 30px rgba(0,0,0,.10)}
  .drawer .dhead{padding:14px 16px;border-bottom:1px solid var(--hair);display:flex;align-items:center;gap:10px}
  .drawer .dscope{font-size:11px;color:var(--ink-2)}
  .drawer .dbody{flex:1;overflow-y:auto;padding:14px 16px}
  .drawer .dfoot{border-top:1px solid var(--hair);padding:12px 14px}
  .msg{margin-bottom:12px;display:flex} .msg.u{justify-content:flex-end}
  .bub{max-width:88%;font-size:13.5px;line-height:1.55;padding:9px 12px;border-radius:10px;white-space:pre-wrap}
  .msg.u .bub{background:var(--ink);color:#fff;border-bottom-right-radius:3px}
  .msg.a .bub{background:var(--panel);color:var(--ink);border-bottom-left-radius:3px}
  .propose{border:1px solid var(--hair);border-radius:var(--r);padding:10px 12px;margin:6px 0;background:#FCFBF9}
  .propose .lab2{font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--ink-2);margin-bottom:5px}

  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>

/* ============================================================
   Helpers
   ============================================================ */
function firstNameOf(name) {
  if (!name) return "there";
  const n = String(name).trim().split(/\s+/)[0];
  return n.replace(/[^A-Za-z'-]/g, "") || "there";
}
function sanitize(t) {
  if (t == null) return "";
  return String(t)
    .replace(/\u2014/g, ", ").replace(/\u2013/g, "-")
    .replace(/[\u2192\u21d2\u2794\u2799\u279c\u2190\u2191\u2193]/g, " ").replace(/->|=>/g, " ")
    .replace(/[\u2018\u2019]/g, "'").replace(/[\u201c\u201d]/g, '"')
    .replace(/[\u2022\u25aa\u25cf\u2043]/g, "")
    .replace(/[ \t]{2,}/g, " ").replace(/ +\n/g, "\n").trim();
}
const wc = (t) => (t ? String(t).trim().split(/\s+/).filter(Boolean).length : 0);
function extractJSON(text) {
  if (!text) return null;
  let c = text.replace(/```json/gi, "").replace(/```/g, "").trim();
  try { return JSON.parse(c); } catch (e) {}
  const s = c.indexOf("{"), e = c.lastIndexOf("}");
  if (s !== -1 && e > s) { try { return JSON.parse(c.slice(s, e + 1)); } catch (er) {} }
  return null;
}

/* ============================================================
   Service calls
   ============================================================ */
async function callClaude({ system, user, model, apiKey, useSearch = false, maxTokens = 4000 }) {
  if (!apiKey) throw new Error("No Anthropic key set. Open Settings and add it.");
  const headers = { "content-type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" };
  const body = { model: model || DEFAULT_MODEL, max_tokens: maxTokens, system, messages: [{ role: "user", content: user }] };
  if (useSearch) body.tools = [{ type: "web_search_20250305", name: "web_search" }];
  let res;
  try { res = await fetch("https://api.anthropic.com/v1/messages", { method: "POST", headers, body: JSON.stringify(body) }); }
  catch (e) { throw new Error("Could not reach the model. Check the network and the key."); }
  let data; try { data = await res.json(); } catch (e) { throw new Error("The model returned an unreadable response."); }
  if (!res.ok || data.error) {
    if (res.status === 401) throw new Error("The Anthropic key was rejected. Check it in Settings.");
    if (res.status === 429) throw new Error("Rate limit reached. Wait a moment and try again.");
    throw new Error((data && data.error && data.error.message) || ("Request failed, status " + res.status));
  }
  return (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n").trim();
}

function proxied(proxyUrl, target) { return proxyUrl ? (proxyUrl.replace(/\/$/, "") + "?url=" + encodeURIComponent(target)) : target; }

/* Perplexity audit through the proxy, falls back to Claude when no proxy or key */
async function auditFacts({ claimsText, contact, settings }) {
  const ask = "You are an independent fact checker for a MedTech advisory firm. Check every checkable claim in the text below about " + contact + ". For each claim return a verdict of confirmed, nuanced or unsupported, a confidence from 0 to 100, a one line note, and a source URL where you have one. Return only valid JSON, no markdown: {\"engine\":\"\",\"findings\":[{\"claim\":\"\",\"verdict\":\"confirmed|nuanced|unsupported\",\"confidence\":0,\"note\":\"\",\"source\":\"\"}]}\n\nTEXT:\n" + claimsText;
  if (settings.proxyUrl && settings.perplexityKey) {
    const url = proxied(settings.proxyUrl, "https://api.perplexity.ai/chat/completions");
    let res;
    try {
      res = await fetch(url, { method: "POST", headers: { "content-type": "application/json", "Authorization": "Bearer " + settings.perplexityKey },
        body: JSON.stringify({ model: "sonar-pro", messages: [{ role: "user", content: ask }] }) });
    } catch (e) { throw new Error("Could not reach Perplexity through the proxy."); }
    const data = await res.json();
    if (!res.ok) throw new Error((data && data.error && (data.error.message || data.error)) || ("Perplexity error, status " + res.status));
    const txt = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
    const p = extractJSON(txt) || {};
    return { engine: "Perplexity sonar-pro", findings: p.findings || [] };
  }
  const txt = await callClaude({ system: "You are an independent fact checker. Use web search.", user: ask, model: settings.model, apiKey: settings.apiKey, useSearch: true, maxTokens: 3500 });
  const p = extractJSON(txt) || {};
  return { engine: "Claude with web search", findings: p.findings || [] };
}

/* GitHub Gist, the cloud save for approved emails */
async function gistRequest(token, method, id, payload) {
  const url = "https://api.github.com/gists" + (id ? "/" + id : "");
  const res = await fetch(url, { method, headers: { "Authorization": "Bearer " + token, "Accept": "application/vnd.github+json", "content-type": "application/json" }, body: payload ? JSON.stringify(payload) : undefined });
  const data = await res.json();
  if (!res.ok) throw new Error((data && data.message) || ("GitHub error, status " + res.status));
  return data;
}

      const ctx = c ? ("You are editing outreach for " + c.name + ", " + (c.title || "") + ", " + c.division + " at Boston Scientific.\nCurrent email subject: " + (c.draft ? c.draft.email.subject : "none") + "\nCurrent email body:\n" + (c.draft ? c.draft.email.body : "none") + "\nCurrent LinkedIn message:\n" + (c.draft ? c.draft.inmail.body : "none")) : "You help the operator steer the studio and answer questions about the account.";
      const system = [
        "You are the studio assistant inside a Boston Scientific outreach tool built for FutureBridge.",
        "You can do three things. Answer a question plainly. Propose a standing instruction that should apply to every future draft. Rewrite the current email and LinkedIn message when asked, keeping the plain English standard, the greeting Hi <first name>, the closing Warm regards on the email only, no em dashes, no arrows, sentence case, email 150 to 175 words, LinkedIn 70 to 100 words.",
        "You cannot change the application's own code or layout. If asked for that, say so plainly and suggest it be done in the chat that generated this file.",
        ctx,
        "Reply in plain English. Then return a single JSON object at the very end, on its own, no markdown: {\"reply\":\"your plain reply\",\"standingRule\":\"a one or two line rule to save, or empty\",\"emailEdit\":{\"subject\":\"\",\"body\":\"\",\"inmail\":\"\"}}. Set emailEdit to null unless you actually rewrote the email.",
        direction ? ("Current standing direction:\n" + direction) : "No standing direction yet.",
      ].join("\n");
      const out = await callClaude({ system, user: text, model: settings.model, apiKey: settings.apiKey, maxTokens: 2000 });
      const p = extractJSON(out) || { reply: out };
      const reply = { role: "assistant", text: sanitize(p.reply || out), standingRule: sanitize(p.standingRule || ""), emailEdit: (p.emailEdit && p.emailEdit.body) ? { subject: sanitize(p.emailEdit.subject || (c && c.draft ? c.draft.email.subject : "")), body: sanitize(p.emailEdit.body), inmail: sanitize(p.emailEdit.inmail || (c && c.draft ? c.draft.inmail.body : "")) } : null, scope };
      if (c) setContact(c.id, prev => ({ chat: [...(prev.chat || []), reply] }));
      else setGlobalChat(prev => [...prev, reply]);
    } catch (e) {
      const err = { role: "assistant", text: "That did not go through. " + (e.message || "") };
      if (c) setContact(c.id, prev => ({ chat: [...(prev.chat || []), err] })); else setGlobalChat(prev => [...prev, err]);
    } finally { setAsstBusy(false); }
  };
  const saveStandingRule = (rule) => { setDirection(prev => prev ? (prev + "\n" + rule) : rule); logAudit("Standing instruction saved", rule, []); flash("Saved. Applied to every future draft."); };
  const applyEmailEdit = (id, edit) => { setContact(id, prev => ({ draft: { ...prev.draft, email: { subject: edit.subject, body: edit.body }, inmail: { body: edit.inmail }, edited: true } })); const nm = contacts.find(c => c.id === id); logAudit("Email updated by assistant", nm ? nm.name : "", []); flash("Email updated."); };

  /* ---------------- Approve, cloud save, export ---------------- */
  const syncCloud = async (items) => {
    if (!settings.githubToken) return;
    try {
      const savedAt = new Date().toISOString().slice(0, 16).replace("T", " ");
      const content = JSON.stringify({ items, savedAt }, null, 2);
      const files = { "approved.json": { content } };
      if (settings.gistId) { await gistRequest(settings.githubToken, "PATCH", settings.gistId, { files }); }
      else { const g = await gistRequest(settings.githubToken, "POST", null, { description: "FutureBridge approved outreach, Boston Scientific", public: false, files }); setSettings(s => ({ ...s, gistId: g.id })); }
      setCloud({ lastSync: savedAt });
      logAudit("Cloud save", items.length + " approved messages saved to private gist", []);
    } catch (e) { flash("Cloud save failed. " + (e.message || "")); }
  };

  const approve = (c, channel, draftBit) => {
    const signer = SIGNERS[settings.signer] || SIGNERS[0];
    const body = channel === "Email" ? (draftBit.body + "\n" + signer.name + "\n" + signer.title) : draftBit.body;
    const item = { id: "a_" + Date.now() + "_" + Math.random().toString(36).slice(2, 6), name: c.name, email: c.email, title: c.title, division: c.division, channel, subject: draftBit.subject || "", body, signedBy: signer.name, approvedAt: new Date().toISOString().slice(0, 16).replace("T", " ") };
    const next = [item, ...approved];
    setApproved(next);
    logAudit("Approved", c.name + ", " + channel + ", signed by " + signer.name, []);
    flash("Approved." + (settings.githubToken ? " Saving to the cloud." : ""));
    if (settings.githubToken) syncCloud(next);
  };

  const downloadCSV = () => {
    if (!approved.length) return;
    const rows = approved.map(a => ({ "Contact name": a.name, "Email": a.email, "Title": a.title, "Division": a.division, "Channel": a.channel, "Subject": a.subject, "Message": a.body, "Signed by": a.signedBy, "Approved at": a.approvedAt }));
    const blob = new Blob([Papa.unparse(rows)], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = "futurebridge_bsx_approved.csv"; a.click(); URL.revokeObjectURL(url);
  };

  const copy = async (text, label) => { try { await navigator.clipboard.writeText(text); } catch (e) { const ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta); ta.select(); try { document.execCommand("copy"); } catch (er) {} document.body.removeChild(ta); } flash((label || "Copied") + "."); };

  const TABS = [["intel", "Intelligence"], ["contacts", "Contacts"], ["outreach", "Outreach"], ["approved", "Approved, " + approved.length], ["settings", "Settings"]];

  return (
    <div>
      <header className="bar"><div className="wrap inner">
        <Mark size={32} />
        <div><div className="eyebrow">FutureBridge, Life Sciences and MedTech</div><h1 className="title">Account Studio</h1></div>
        <div className="spacer" />
        <div className="acct"><div className="k">Account</div><div className="v">Boston Scientific</div></div>
        <button className="btn sm" onClick={() => setDrawer({ scope: "global", title: "Studio assistant" })}>Assistant</button>
      </div></header>

      <nav className="tabs"><div className="wrap inner">
        {TABS.map(([k, t]) => <button key={k} className={tab === k ? "on" : ""} onClick={() => setTab(k)}>{t}</button>)}
      </div></nav>

      <main><div className="wrap">
        {!keySet && tab !== "settings" ? (
          <div className="card" style={{ borderLeft: "3px solid var(--red)" }}><div className="body">
            <strong>Add your Anthropic key to start.</strong>
            <p className="note" style={{ margin: "6px 0 10px" }}>Research, drafting and the audit run from this page. The key stays in your browser.</p>
            <button className="btn red sm" onClick={() => setTab("settings")}>Open Settings</button>
          </div></div>
        ) : null}

        {tab === "intel" ? <IntelView intel={intel} refreshing={refreshing} onRefresh={refreshIntel} keySet={keySet} /> : null}
        {tab === "contacts" ? <ContactsView contacts={contacts} setContact={setContact} setContacts={setContacts} onUpload={() => fileRef.current && fileRef.current.click()} onAddManual={addManual} onPullHs={pullFromHubSpot} hsPulling={hsPulling} onResearch={research} onGenerate={generate} genBusy={genBusy} keySet={keySet} goOutreach={() => setTab("outreach")} /> : null}
        {tab === "outreach" ? <OutreachView contacts={contacts} signer={SIGNERS[settings.signer] || SIGNERS[0]} onGenerate={generate} genBusy={genBusy} onAudit={runAudit} auditBusy={auditBusy} onApprove={approve} onCopy={copy} onSaveEdit={saveEdit} onAsk={(id) => setDrawer({ scope: id, title: "Editing " + ((contacts.find(c => c.id === id) || {}).name || "") })} keySet={keySet} goContacts={() => setTab("contacts")} /> : null}
        {tab === "approved" ? <ApprovedView approved={approved} setApproved={setApproved} onDownload={downloadCSV} onCopy={copy} cloud={cloud} onSync={() => syncCloud(approved)} cloudOn={!!settings.githubToken} settings={settings} flash={flash} logAudit={logAudit} /> : null}
        {tab === "settings" ? <SettingsView settings={settings} setSettings={setSettings} direction={direction} setDirection={setDirection} audit={audit} setAudit={setAudit} /> : null}
      </div></main>

      <input ref={fileRef} type="file" accept=".csv,.xlsx,.xls" style={{ display: "none" }} onChange={e => { if (e.target.files && e.target.files[0]) handleFile(e.target.files[0]); e.target.value = ""; }} />

      {drawer ? (
        <Assistant drawer={drawer} onClose={() => setDrawer(null)} busy={asstBusy} onSend={(t) => askAssistant(drawer.scope, t)}
          messages={drawer.scope === "global" ? globalChat : ((contacts.find(c => c.id === drawer.scope) || {}).chat || [])}
          onSaveRule={saveStandingRule} onApplyEdit={(edit) => applyEmailEdit(drawer.scope, edit)} keySet={keySet} />
      ) : null}

      {toast ? <div className="toast">{toast}</div> : null}
    </div>
  );
}

function StatusPill({ status }) {

  return <span className={"pill " + m[1]}>{m[0]}</span>;
}
function ContactsView({ contacts, setContact, setContacts, onUpload, onAddManual, onPullHs, hsPulling, onResearch, onGenerate, genBusy, keySet, goOutreach }) {

  const showSign = channel === "Email";

  if (editing) {
    return (
      <div className="inner2">
        {channel === "Email" ? (<><label className="lab">Subject</label><input className="f" style={{ marginBottom: 10 }} value={subject} onChange={e => onChange({ subject: e.target.value, body })} /></>) : null}
        <label className="lab">Message</label>
        <textarea className="f" style={{ minHeight: channel === "Email" ? 220 : 130 }} value={body} onChange={e => onChange({ subject, body: e.target.value })} />
      </div>
    );
  }
  return (
    <div className="inner2">
      {channel === "Email" && subject ? <p className="subject">{subject}</p> : null}

      {showSign ? <p className="sign">{signer.name}<br />{signer.title}</p> : null}

}

                {d.findings.map((f, i) => (
                  <div className="find" key={i}>
                    <span className={"vc " + (f.verdict || "")}>{(f.verdict || "").replace("_", " ")}</span>
                    <span className="conf" title={"confidence " + f.confidence}><i style={{ width: Math.max(0, Math.min(100, f.confidence)) + "%", background: f.confidence >= 70 ? "var(--ok)" : f.confidence >= 40 ? "var(--warn)" : "var(--red)" }} /></span>
                    <span className="tiny">{f.confidence}</span>  {f.claim}. <span className="muted">{f.note}</span>{f.source ? <a className="src" href={f.source} target="_blank" rel="noreferrer">source</a> : null}
                  </div>
                ))}
              </div>
            ) : null}
          </div>
        )}
      </div>
    </div>
  );
}

function OutreachView({ contacts, signer, onGenerate, genBusy, onAudit, auditBusy, onApprove, onCopy, onSaveEdit, onAsk, keySet, goContacts }) {
  const ready = contacts.filter(c => c.draft);
  const researched = contacts.filter(c => c.status !== "new" && c.status !== "left" && !c.draft);
  if (!ready.length && !researched.length) return <div className="empty">Nothing to draft yet. Research a contact first, then draft their outreach.<div style={{ marginTop: 12 }}><button className="btn" onClick={goContacts}>Go to Contacts</button></div></div>;
  return (
    <div>
      <p className="lead">One email and one LinkedIn message per person, the single best version for that reader. The panel above each one shows the uncommon insight it opens on and the two pressures it is built around. Edit anything, then approve.</p>
      {researched.map(c => (
        <div className="card" key={c.id}><div className="crow">
          <div><div className="cname">{c.name}</div><div className="ctitle">{c.title}, {c.division}</div></div>
          <div className="grow"><button className="btn sm primary" disabled={genBusy === c.id || !keySet} onClick={() => onGenerate(c.id)}>{genBusy === c.id ? <span><span className="spin" />Writing</span> : "Draft outreach"}</button></div>
        </div></div>
      ))}
      {ready.map(c => <OutreachCard key={c.id} c={c} signer={signer} onGenerate={onGenerate} genBusy={genBusy} onAudit={onAudit} auditBusy={auditBusy} onApprove={onApprove} onCopy={onCopy} onSaveEdit={onSaveEdit} onAsk={onAsk} keySet={keySet} />)}
    </div>
  );
}

/* ---------------- Approved ---------------- */
function ApprovedView({ approved, setApproved, onDownload, onCopy, cloud, onSync, cloudOn, settings, flash, logAudit }) {
  const [pushing, setPushing] = useState(false);
  const pushToHubSpot = async () => {
    if (!settings.hubspotToken) { flash("Add a HubSpot token in Settings."); return; }
    if (!settings.proxyUrl) { flash("HubSpot blocks browser calls. Set a proxy URL in Settings, or use the CSV."); return; }
    setPushing(true);
    let ok = 0;
    try {
      for (const a of approved.filter(x => x.email)) {
        try {
          const search = await fetch(proxied(settings.proxyUrl, "https://api.hubapi.com/crm/v3/objects/contacts/search"), { method: "POST", headers: { "Authorization": "Bearer " + settings.hubspotToken, "content-type": "application/json" }, body: JSON.stringify({ filterGroups: [{ filters: [{ propertyName: "email", operator: "EQ", value: a.email }] }], properties: ["email"], limit: 1 }) });
          const sj = await search.json();
          const cid = sj.results && sj.results[0] && sj.results[0].id;
          const noteBody = "FutureBridge approved outreach, awaiting send.\nChannel: " + a.channel + (a.subject ? "\nSubject: " + a.subject : "") + "\n\n" + a.body;
          const note = await fetch(proxied(settings.proxyUrl, "https://api.hubapi.com/crm/v3/objects/notes"), { method: "POST", headers: { "Authorization": "Bearer " + settings.hubspotToken, "content-type": "application/json" }, body: JSON.stringify({ properties: { hs_note_body: noteBody, hs_timestamp: Date.now() }, associations: cid ? [{ to: { id: cid }, types: [{ associationCategory: "HUBSPOT_DEFINED", associationTypeId: 202 }] }] : [] }) });
          if (note.ok) ok++;
        } catch (e) {}
      }
      logAudit("HubSpot push", ok + " notes logged on contact records", []);
      flash(ok + " logged to HubSpot as notes awaiting send.");
    } catch (e) { flash("HubSpot push failed. " + (e.message || "")); }
    finally { setPushing(false); }
  };
  return (
    <div>
      <p className="lead">Every approved message collects here with its signature. Nothing sends on its own. {cloudOn ? "Approved messages are saved to your private gist and load whenever you open this on any device, with the time of the last save." : "Connect cloud save in Settings to keep these across devices."}</p>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 8 }}>
        <button className="btn primary" disabled={!approved.length} onClick={onDownload}>Download CSV</button>
        <button className="btn" disabled={!approved.length || pushing} onClick={pushToHubSpot}>{pushing ? <span><span className="spin" />Pushing</span> : "Push to HubSpot"}</button>
        {cloudOn ? <button className="btn" disabled={!approved.length} onClick={onSync}>Save to cloud now</button> : null}
        {approved.length ? <button className="btn" onClick={() => { if (confirm("Clear the on screen list? The cloud copy stays until the next save.")) setApproved([]); }}>Clear list</button> : null}
      </div>
      {cloud && cloud.lastSync ? <p className="tiny" style={{ margin: "0 0 16px" }}>Last cloud save, {cloud.lastSync}.</p> : <div style={{ height: 8 }} />}
      {!approved.length ? <div className="empty">Nothing approved yet. Approve a draft on the Outreach tab and it lands here.</div> : approved.map(a => (
        <div className="card" key={a.id}>
          <div className="cap" style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap", fontWeight: 400 }}>
            <strong style={{ fontSize: 14 }}>{a.name}</strong><span className="tiny">{a.channel}, signed by {a.signedBy}, approved {a.approvedAt}</span>
            <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
              <button className="btn sm" onClick={() => onCopy((a.subject ? "Subject: " + a.subject + "\n\n" : "") + a.body, "Copied")}>Copy</button>
              <button className="btn sm" onClick={() => setApproved(prev => prev.filter(x => x.id !== a.id))}>Remove</button>
            </div>
          </div>
          <div className="body">{a.subject ? <p className="subject" style={{ marginBottom: 8 }}>{a.subject}</p> : null}<p className="text">{a.body}</p></div>
        </div>
      ))}
    </div>
  );
}

/* ---------------- Settings ---------------- */
function SettingsView({ settings, setSettings, direction, setDirection, audit, setAudit }) {
  const set = (patch) => setSettings(prev => ({ ...prev, ...patch }));
  return (
    <div>
      <p className="lead">The studio runs from this page. Keys, edits, contacts and approvals live in this browser. The only data that leaves is what you send to the model, the audit, HubSpot or your own private gist, on the calls you trigger.</p>

      <div className="card"><div className="cap">Model</div><div className="body">
        <label className="lab">Anthropic API key, required</label>
        <input className="f" type="password" placeholder="sk-ant-..." value={settings.apiKey} onChange={e => set({ apiKey: e.target.value.trim() })} />
        <p className="note" style={{ margin: "6px 0 16px" }}>Used to research, draft, edit and audit. Get one at <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noreferrer">console.anthropic.com</a>.</p>
        <div className="grid2">
          <div><label className="lab">Model</label><select className="f" value={settings.model} onChange={e => set({ model: e.target.value })}>{MODELS.map(m => <option key={m.id} value={m.id}>{m.label}</option>)}</select></div>
          <div><label className="lab">Default signer</label><select className="f" value={settings.signer} onChange={e => set({ signer: Number(e.target.value) })}>{SIGNERS.map((s, i) => <option key={i} value={i}>{s.name}, {s.title}</option>)}</select></div>
        </div>
      </div></div>

      <div className="card"><div className="cap">Cloud save for approved emails</div><div className="body">
        <p className="note" style={{ margin: "0 0 10px" }}>Approved emails are saved to a private GitHub gist, so they load with the time of the last save whenever you open this on any device. Create a token with the gist permission at <a href="https://github.com/settings/tokens" target="_blank" rel="noreferrer">github.com settings tokens</a>. The gist is created on your first approval.</p>
        <div className="grid2">
          <div><label className="lab">GitHub token, gist permission</label><input className="f" type="password" placeholder="ghp_..." value={settings.githubToken} onChange={e => set({ githubToken: e.target.value.trim() })} /></div>
          <div><label className="lab">Gist id, filled in automatically</label><input className="f" value={settings.gistId} onChange={e => set({ gistId: e.target.value.trim() })} placeholder="Created on first save" /></div>
        </div>
      </div></div>

      <div className="card"><div className="cap">HubSpot and the fact audit</div><div className="body">
        <p className="note" style={{ margin: "0 0 10px" }}>HubSpot and Perplexity block calls made straight from a web page, so they need a small proxy. The README has a one file Cloudflare Worker you can deploy free in two minutes. Paste its address below. Without it, contacts still import by CSV, approved emails still export by CSV, and the fact audit runs through the model.</p>
        <label className="lab">Proxy address, optional</label>
        <input className="f" style={{ marginBottom: 12 }} placeholder="https://your-worker.workers.dev" value={settings.proxyUrl} onChange={e => set({ proxyUrl: e.target.value.trim() })} />
        <div className="grid2">
          <div><label className="lab">HubSpot private app token</label><input className="f" type="password" placeholder="pat-..." value={settings.hubspotToken} onChange={e => set({ hubspotToken: e.target.value.trim() })} /></div>
          <div><label className="lab">Perplexity API key, for a second audit</label><input className="f" type="password" placeholder="pplx-..." value={settings.perplexityKey} onChange={e => set({ perplexityKey: e.target.value.trim() })} /></div>
        </div>
      </div></div>

      <div className="card"><div className="cap">Standing direction</div><div className="body">
        <p className="note" style={{ margin: "0 0 8px" }}>Plain instructions that apply to every future draft. The plain English standard always applies underneath. You can also add to this from the assistant.</p>
        <textarea className="f" style={{ minHeight: 110 }} value={direction} onChange={e => setDirection(e.target.value)} placeholder="Empty. Add standing rules here, or save them from the assistant." />
      </div></div>

      <div className="card"><div className="cap" style={{ display: "flex", alignItems: "center" }}>Audit log{audit.length ? <button className="btn sm" style={{ marginLeft: "auto", fontWeight: 400 }} onClick={() => { if (confirm("Clear the audit log?")) setAudit([]); }}>Clear</button> : null}</div><div className="body">
        {!audit.length ? <p className="note" style={{ margin: 0 }}>Nothing logged yet. Research, drafting, edits, audits, approvals and saves are recorded here.</p> : audit.map((e, i) => (
          <div key={i} style={{ fontSize: 12.5, padding: "6px 0", borderBottom: i === audit.length - 1 ? "none" : "1px solid var(--hair)" }}><span className="tiny">{e.time}</span> <strong>{e.type}</strong>. {e.detail}{e.sources && e.sources.length ? <span className="tiny"> {e.sources.length} source{e.sources.length > 1 ? "s" : ""}</span> : null}</div>
        ))}
      </div></div>

      <p className="note">Contact details are personal data. Handle them under your usual data protection practice. The audit log records why a person is believed to hold the role attributed to them, which is the evidence good practice asks for.</p>
    </div>
  );
}

/* ---------------- Assistant drawer ---------------- */
function Assistant({ drawer, onClose, busy, onSend, messages, onSaveRule, onApplyEdit, keySet }) {
  const [text, setText] = useState("");
  const bodyRef = useRef(null);
  useEffect(() => { if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight; }, [messages, busy]);
  const send = () => { const t = text.trim(); if (!t || busy) return; onSend(t); setText(""); };
  return (
    <>
      <div className="scrim" onClick={onClose} />
      <div className="drawer">
        <div className="dhead"><Mark size={22} /><div><div style={{ fontSize: 13, fontWeight: 700 }}>{drawer.title}</div><div className="dscope">{drawer.scope === "global" ? "Ask about the account or set a standing instruction" : "Edit this email without leaving the page"}</div></div><button className="btn sm" style={{ marginLeft: "auto" }} onClick={onClose}>Close</button></div>
        <div className="dbody" ref={bodyRef}>
          {!messages.length ? <p className="note">{drawer.scope === "global" ? "For example, ask what is driving electrophysiology right now, or say always open emails with one short sentence and save it as a standing instruction." : "For example, make this warmer, lead on the capacity point, or shorten the second paragraph. The assistant rewrites the email and you apply it here."}</p> : null}
          {messages.map((m, i) => (
            <div key={i}>
              <div className={"msg " + (m.role === "user" ? "u" : "a")}><div className="bub">{m.text}</div></div>
              {m.role === "assistant" && m.standingRule ? (
                <div className="propose"><div className="lab2">Proposed standing instruction</div><p style={{ margin: "0 0 8px", fontSize: 13 }}>{m.standingRule}</p><button className="btn sm primary" onClick={() => onSaveRule(m.standingRule)}>Save as standing instruction</button></div>
              ) : null}
              {m.role === "assistant" && m.emailEdit ? (
                <div className="propose"><div className="lab2">Rewritten email ready</div><p style={{ margin: "0 0 8px", fontSize: 13 }}>The assistant has rewritten the email and message. Apply it to the draft.</p><button className="btn sm primary" onClick={() => onApplyEdit(m.emailEdit)}>Apply to this email</button></div>
              ) : null}
            </div>
          ))}
          {busy ? <div className="msg a"><div className="bub"><span className="spin" />Working</div></div> : null}
        </div>
        <div className="dfoot">
          {!keySet ? <p className="tiny" style={{ margin: "0 0 8px" }}>Add your Anthropic key in Settings to use the assistant.</p> : null}
          <div style={{ display: "flex", gap: 8 }}>
            <input className="f" placeholder="Type an instruction or a question" value={text} disabled={!keySet} onChange={e => setText(e.target.value)} onKeyDown={e => { if (e.key === "Enter") send(); }} />
            <button className="btn primary" disabled={busy || !keySet} onClick={send}>Send</button>
          </div>
        </div>
      </div>
    </>
  );
}

const boot = document.getElementById("boot"); if (boot) boot.remove();
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
