/* ---------------- Contacts ---------------- */
function StatusPill({ status }) {
  const m = { new: ["Not researched", ""], researching: ["Researching", "warn"], verified: ["Verified, current", "ok"], left: ["Left the company", "bad"], unclear: ["Could not confirm", "warn"] }[status] || ["Not researched", ""];
  return <span className={"pill " + m[1]}>{m[0]}</span>;
}
function ContactsView({ contacts, setContact, setContacts, onUpload, onAddManual, onPullHs, hsPulling, onResearch, onGenerate, genBusy, keySet, goOutreach, onVerifyPdl, pdlBusy, pdlReady, pdlKeySet, onAuditContact, auditBusy, perplexityReady }) {
  const [showForm, setShowForm] = React.useState(false);
  const blank = { name: "", title: "", division: "Electrophysiology", email: "", linkedin: "", region: "", company: "Boston Scientific" };
  const [form, setForm] = React.useState(blank);
  const fset = (patch) => setForm(prev => ({ ...prev, ...patch }));

  const submit = () => {
    if (!form.name.trim()) return;
    onAddManual(form);
    setForm(blank);
    setShowForm(false);
  };

  return (
    <div>
      <p className="lead">Load your target list, then research each person. Research checks they still hold the role before anything else, then gathers recent public signals and scores their likely areas, most pressing first.</p>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 18 }}>
        <button className="btn primary" onClick={onUpload}>Upload list, CSV or Excel</button>
        <button className="btn" onClick={onPullHs} disabled={hsPulling}>{hsPulling ? <span><span className="spin" />Pulling</span> : "Pull contacts from HubSpot"}</button>
        <button className="btn" onClick={() => setShowForm(s => !s)}>{showForm ? "Cancel" : "Add one by hand"}</button>
      </div>

      {showForm ? (
        <div className="card" style={{ borderLeft: "3px solid var(--red)", marginBottom: 18 }}><div className="body">
          <p className="tiny" style={{ textTransform: "uppercase", letterSpacing: ".8px", margin: "0 0 14px", fontWeight: 700 }}>Add a contact manually</p>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <div><label className="lab">Full name *</label><input className="f" placeholder="Jane Smith" value={form.name} onChange={e => fset({ name: e.target.value })} /></div>
            <div><label className="lab">Job title</label><input className="f" placeholder="VP, Electrophysiology" value={form.title} onChange={e => fset({ title: e.target.value })} /></div>
            <div><label className="lab">Email address</label><input className="f" type="email" placeholder="jane.smith@bsci.com" value={form.email} onChange={e => fset({ email: e.target.value })} /></div>
            <div><label className="lab">LinkedIn URL</label><input className="f" placeholder="https://linkedin.com/in/..." value={form.linkedin} onChange={e => fset({ linkedin: e.target.value })} /></div>
            <div><label className="lab">Division</label>
              <select className="f" value={form.division} onChange={e => fset({ division: e.target.value })}>
                {Object.keys(DIVISIONS).map(d => <option key={d}>{d}</option>)}
              </select>
            </div>
            <div><label className="lab">Region or location</label><input className="f" placeholder="e.g. United States, EMEA" value={form.region} onChange={e => fset({ region: e.target.value })} /></div>
            <div><label className="lab">Company</label><input className="f" value={form.company} onChange={e => fset({ company: e.target.value })} /></div>
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
            <button className="btn primary" disabled={!form.name.trim()} onClick={submit}>Add contact</button>
            <button className="btn" onClick={() => { setShowForm(false); setForm(blank); }}>Cancel</button>
          </div>
        </div></div>
      ) : null}

      {!contacts.length ? (
        <div className="empty">No contacts yet. Upload a list, pull from HubSpot, add one by hand, or push recommended contacts from the Intelligence tab.</div>
      ) : contacts.map(c => (
        <div className="card" key={c.id}>
          <div className="crow">
            <div style={{ minWidth: 200 }}>
              {c.tag === "Recommended Contact" ? <span className="pill" style={{ marginBottom: 4, display: "inline-block", background: "#EAF0FB", color: "#2A52A0" }}>Recommended Contact</span> : null}
              {c.sourceRole ? <div className="tiny" style={{ color: "var(--faint)", marginBottom: 3 }}>From hot targets: {c.sourceRole}</div> : null}
              {c.name ? <div className="cname">{c.name}</div> : <input className="f" style={{ maxWidth: 220 }} placeholder="Full name" value={c.name} onChange={e => setContact(c.id, { name: e.target.value })} />}
              <div className="ctitle">{c.title || "Title not set"}{c.region ? ", " + c.region : ""}</div>
            </div>
            <select className="f" style={{ width: 240 }} value={c.division} onChange={e => setContact(c.id, { division: e.target.value })}>{Object.keys(DIVISIONS).map(d => <option key={d}>{d}</option>)}</select>
            <StatusPill status={c.status} />
            <div className="grow">
              <button className="btn sm" disabled={c.status === "researching" || !keySet} onClick={() => onResearch(c.id)}>{c.status === "researching" ? <span><span className="spin" />Researching</span> : c.status === "new" ? "Verify and research" : "Re run research"}</button>
              <button className="btn sm" disabled={!pdlKeySet || !c.name || pdlBusy === ("c" + c.id)} onClick={() => onVerifyPdl(c.id)} title={pdlKeySet ? "Confirm title and current employer with People Data Labs" : "Add a People Data Labs key in Settings"}>{pdlBusy === ("c" + c.id) ? <span><span className="spin" />Checking</span> : "Verify with PDL"}</button>
              <button className="btn sm" disabled={!perplexityReady || !(c.summary || c.signals.length) || auditBusy === c.id} onClick={() => onAuditContact(c.id)} title={perplexityReady ? "Check the research with Perplexity Pro" : "Add a Perplexity key and the proxy in Settings"}>{auditBusy === c.id ? <span><span className="spin" />Checking</span> : "Audit with Perplexity"}</button>
              <button className="btn sm" disabled={c.status === "left" || genBusy === c.id || !keySet} onClick={() => onGenerate(c.id)}>{genBusy === c.id ? <span><span className="spin" />Writing</span> : "Draft outreach"}</button>
              <button className="btn sm" onClick={() => setContacts(prev => prev.filter(x => x.id !== c.id))}>Remove</button>
            </div>
          </div>
          {c.status === "left" ? (
            <div className="body" style={{ borderTop: "1px solid var(--hair)", color: "var(--red)", fontSize: 13 }}>Sources suggest this person has left Boston Scientific. Research stopped. Exclude from outreach.</div>
          ) : (c.summary || c.signals.length || c.pains.length || c.pdl) ? (
            <div className="body" style={{ borderTop: "1px solid var(--hair)" }}>
              {c.pdl ? <p style={{ margin: "0 0 10px", fontSize: 13 }}><span className="vc confirmed">PDL</span>{c.pdl.title || "title not returned"}{c.pdl.company ? ", " + c.pdl.company : ""}{c.pdl.confidence ? <span className="tiny" style={{ marginLeft: 6 }}>confidence {c.pdl.confidence}</span> : null}{c.pdl.linkedin ? <a className="src" href={c.pdl.linkedin} target="_blank" rel="noreferrer">profile</a> : null}</p> : null}
              {c.summary ? <p style={{ margin: "0 0 10px", fontSize: 13.5 }}>{c.summary}</p> : null}
              {c.signals.length ? (<div style={{ marginBottom: 10 }}><p className="tiny" style={{ margin: "0 0 5px", textTransform: "uppercase", letterSpacing: ".8px" }}>Recent signals</p>{c.signals.map((s, i) => <p key={i} style={{ margin: "0 0 4px", fontSize: 13 }}>{s.text} <span className="tiny">{s.date}</span>{s.source ? <a className="src" href={s.source} target="_blank" rel="noreferrer">source</a> : null}</p>)}</div>) : null}
              {c.pains.length ? (<div><p className="tiny" style={{ margin: "0 0 5px", textTransform: "uppercase", letterSpacing: ".8px" }}>Likely areas, most pressing first</p>{c.pains.map((p, i) => <p key={i} style={{ margin: "0 0 4px", fontSize: 13 }}><span className="pri">{p.score}/10</span> {p.pain}<span className="tiny"> {p.reason}</span></p>)}</div>) : null}
              {c.draft ? <p className="tiny" style={{ marginTop: 10 }}>Draft ready. Open the Outreach tab to read, edit and approve.</p> : null}
              {c.researchFindings && c.researchFindings.length ? (
                <div style={{ marginTop: 10, borderTop: "1px dashed var(--hair)", paddingTop: 10 }}>
                  <p className="tiny" style={{ margin: "0 0 6px", textTransform: "uppercase", letterSpacing: ".8px" }}>Checked with {c.researchAuditEngine || "Perplexity"}</p>
                  {c.researchFindings.map((f, i) => (
                    <p key={i} style={{ margin: "0 0 4px", fontSize: 13 }}>
                      <span className="pill" style={{ background: f.verdict === "confirmed" ? "var(--ok-soft)" : f.verdict === "unsupported" ? "#FBEAEA" : "var(--panel)", color: f.verdict === "confirmed" ? "#1B6A45" : f.verdict === "unsupported" ? "#9A2020" : "var(--ink-2)" }}>{f.verdict}</span>
                      {" "}{f.claim}<span className="tiny"> {f.note}</span>{f.source ? <a className="src" href={f.source} target="_blank" rel="noreferrer">source</a> : null}
                    </p>
                  ))}
                </div>
              ) : null}
            </div>
          ) : null}
        </div>
      ))}
      {contacts.some(c => c.draft) ? <button className="btn" onClick={goOutreach} style={{ marginTop: 4 }}>Go to Outreach</button> : null}
    </div>
  );
}

/* ---------------- Outreach ---------------- */
function MailBlock({ channel, subject, body, signer, editing, onChange }) {
  const showSign = channel === "Email";
  const count = wc(body);
  const target = channel === "Email" ? "about 180" : "70 to 100";
  if (editing) {
    return (
      <div className="inner2">
        {channel === "Email" ? (<><label className="lab">Subject</label><input className="f" style={{ marginBottom: 10 }} value={subject} onChange={e => onChange({ subject: e.target.value, body })} /></>) : null}
        <label className="lab">Message</label>
        <textarea className="f" style={{ minHeight: channel === "Email" ? 220 : 130 }} value={body} onChange={e => onChange({ subject, body: e.target.value })} />
      </div>
    );
  }
  return (
    <div className="inner2">
      {channel === "Email" && subject ? <p className="subject">{subject}</p> : null}
      <p className="text">{body}</p>
      {showSign ? <p className="sign">{signer.name}<br />{signer.title}</p> : null}
      <p className="tiny" style={{ marginTop: 10 }}>{count} words, aim {target}</p>
    </div>
  );
}

function OutreachCard({ c, signer, onGenerate, genBusy, onAudit, auditBusy, onApprove, onCopy, onSaveEdit, onAsk, keySet }) {
  const d = c.draft;
  const [editing, setEditing] = useState(false);
  const [es, setEs] = useState(d.email.subject);
  const [eb, setEb] = useState(d.email.body);
  const [ib, setIb] = useState(d.inmail.body);
  useEffect(() => { setEs(d.email.subject); setEb(d.email.body); setIb(d.inmail.body); }, [d.email.subject, d.email.body, d.inmail.body]);

  const emailFull = (d.email.subject ? "Subject: " + es + "\n\n" : "") + eb + "\n" + signer.name + "\n" + signer.title;

  return (
    <div className="card">
      <div className="cap" style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
        <span>{c.name}</span><span className="tiny" style={{ fontWeight: 400 }}>{c.title}, {c.division}</span>{d.edited ? <span className="flag">edited</span> : null}
        <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
          <button className="btn sm" disabled={!keySet} onClick={() => onAsk(c.id)}>Ask the assistant</button>
          <button className="btn sm" disabled={genBusy === c.id || !keySet} onClick={() => onGenerate(c.id)}>{genBusy === c.id ? <span><span className="spin" />Writing</span> : "Redraft"}</button>
        </div>
      </div>
      <div className="body">
        {!d.fit ? <p style={{ margin: 0, color: "var(--warn)", fontSize: 14 }}>Marked as not a fit. {d.fitReason}</p> : (
          <div>
            <div className="builton">
              <p className="k">Built on</p>
              {d.insight ? <p className="insight">{d.insight}</p> : null}
              {d.painsUsed.length ? (<><p className="k">The two areas this is built around</p><ul>{d.painsUsed.map((s, i) => <li key={i}>{s}</li>)}</ul></>) : null}
              {d.signalsUsed.length ? (<><p className="k">Signals used and why they matter to this person</p><ul>{d.signalsUsed.map((s, i) => <li key={i}>{s}</li>)}</ul></>) : null}
            </div>

            <p className="tiny" style={{ textTransform: "uppercase", letterSpacing: ".8px", margin: "6px 0 8px" }}>Email</p>
            <div className="mail" style={{ marginBottom: 16 }}>
              <div className="top"><span className="tiny" style={{ fontWeight: 700, color: "var(--ink-2)" }}>The single best version for this person</span>
                <div className="wc" style={{ display: "flex", gap: 8 }}>
                  <button className="btn sm" disabled={!keySet} onClick={() => onAsk(c.id)}>Ask the assistant</button>
                  {!editing ? <button className="btn sm" onClick={() => setEditing(true)}>Edit</button> : (<><button className="btn sm primary" onClick={() => { onSaveEdit(c.id, es, eb, ib); setEditing(false); }}>Save changes</button><button className="btn sm" onClick={() => { setEs(d.email.subject); setEb(d.email.body); setIb(d.inmail.body); setEditing(false); }}>Cancel</button></>)}
                </div>
              </div>
              <MailBlock channel="Email" subject={es} body={eb} signer={signer} editing={editing} onChange={(v) => { setEs(v.subject); setEb(v.body); }} />
              {!editing ? <div className="acts"><button className="btn sm" onClick={() => onCopy(emailFull, "Email copied")}>Copy</button><button className="btn primary sm" onClick={() => onApprove(c, "Email", { subject: es, body: eb })}>Approve email</button></div> : null}
            </div>

            <p className="tiny" style={{ textTransform: "uppercase", letterSpacing: ".8px", margin: "6px 0 8px" }}>LinkedIn message</p>
            <div className="mail">
              <div className="top"><span className="tiny" style={{ fontWeight: 700, color: "var(--ink-2)" }}>A tighter version for LinkedIn</span>
                <div className="wc" style={{ display: "flex", gap: 8 }}>
                  <button className="btn sm" disabled={!keySet} onClick={() => onAsk(c.id)}>Ask the assistant</button>
                  {!editing ? <button className="btn sm" onClick={() => setEditing(true)}>Edit</button> : (<><button className="btn sm primary" onClick={() => { onSaveEdit(c.id, es, eb, ib); setEditing(false); }}>Save changes</button><button className="btn sm" onClick={() => { setEs(d.email.subject); setEb(d.email.body); setIb(d.inmail.body); setEditing(false); }}>Cancel</button></>)}
                </div>
              </div>
              <MailBlock channel="LinkedIn" subject="" body={ib} signer={signer} editing={editing} onChange={(v) => setIb(v.body)} />
              {!editing ? <div className="acts"><button className="btn sm" onClick={() => onCopy(ib, "Message copied")}>Copy</button><button className="btn primary sm" onClick={() => onApprove(c, "LinkedIn", { subject: "", body: ib })}>Approve message</button></div> : null}
            </div>

            <div style={{ marginTop: 16, display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
              <button className="btn sm" disabled={auditBusy === c.id || !keySet} onClick={() => onAudit(c.id)}>{auditBusy === c.id ? <span><span className="spin" />Checking the facts</span> : "Audit the facts"}</button>
              {d.auditEngine ? <span className="tiny">Last checked with {d.auditEngine}</span> : <span className="tiny">An independent check of every claim, with a confidence score on each.</span>}
            </div>
            {d.findings && d.findings.length ? (
              <div style={{ marginTop: 12 }}>
                {d.findings.map((f, i) => (
                  <div className="find" key={i}>
                    <span className={"vc " + (f.verdict || "")}>{(f.verdict || "").replace("_", " ")}</span>
                    <span className="conf" title={"confidence " + f.confidence}><i style={{ width: Math.max(0, Math.min(100, f.confidence)) + "%", background: f.confidence >= 70 ? "var(--ok)" : f.confidence >= 40 ? "var(--warn)" : "var(--red)" }} /></span>
                    <span className="tiny">{f.confidence}</span>  {f.claim}. <span className="muted">{f.note}</span>{f.source ? <a className="src" href={f.source} target="_blank" rel="noreferrer">source</a> : null}
                  </div>
                ))}
              </div>
            ) : null}
          </div>
        )}
      </div>
    </div>
  );
}

function OutreachView({ contacts, signer, onGenerate, genBusy, onAudit, auditBusy, onApprove, onCopy, onSaveEdit, onAsk, keySet, goContacts }) {
  const ready = contacts.filter(c => c.draft);
  const researched = contacts.filter(c => c.status !== "new" && c.status !== "left" && !c.draft);
  if (!ready.length && !researched.length) return <div className="empty">Nothing to draft yet. Research a contact first, then draft their outreach.<div style={{ marginTop: 12 }}><button className="btn" onClick={goContacts}>Go to Contacts</button></div></div>;
  return (
    <div>
      <p className="lead">One email and one LinkedIn message per person, the single best version for that reader. The panel above each one shows the uncommon observation it opens on and the two areas it is built around. Edit anything, then approve.</p>
      {researched.map(c => (
        <div className="card" key={c.id}><div className="crow">
          <div><div className="cname">{c.name}</div><div className="ctitle">{c.title}, {c.division}</div></div>
          <div className="grow"><button className="btn sm primary" disabled={genBusy === c.id || !keySet} onClick={() => onGenerate(c.id)}>{genBusy === c.id ? <span><span className="spin" />Writing</span> : "Draft outreach"}</button></div>
        </div></div>
      ))}
      {ready.map(c => <OutreachCard key={c.id} c={c} signer={signer} onGenerate={onGenerate} genBusy={genBusy} onAudit={onAudit} auditBusy={auditBusy} onApprove={onApprove} onCopy={onCopy} onSaveEdit={onSaveEdit} onAsk={onAsk} keySet={keySet} />)}
    </div>
  );
}

/* ---------------- Approved ---------------- */
function ApprovedView({ approved, setApproved, onDownload, onCopy, cloud, onSync, cloudOn, settings, flash, logAudit }) {
  const [pushing, setPushing] = useState(false);
  const pushToHubSpot = async () => {
    if (!settings.hubspotToken) { flash("Add a HubSpot token in Settings."); return; }
    if (!settings.proxyUrl) { flash("HubSpot blocks browser calls. Set a proxy URL in Settings, or use the CSV."); return; }
    setPushing(true);
    let ok = 0;
    try {
      for (const a of approved.filter(x => x.email)) {
        try {
          const search = await fetch(proxied(settings.proxyUrl, "https://api.hubapi.com/crm/v3/objects/contacts/search"), { method: "POST", headers: { "Authorization": "Bearer " + settings.hubspotToken, "content-type": "application/json" }, body: JSON.stringify({ filterGroups: [{ filters: [{ propertyName: "email", operator: "EQ", value: a.email }] }], properties: ["email"], limit: 1 }) });
          const sj = await search.json();
          const cid = sj.results && sj.results[0] && sj.results[0].id;
          const noteBody = "FutureBridge approved outreach, awaiting send.\nChannel: " + a.channel + (a.subject ? "\nSubject: " + a.subject : "") + "\n\n" + a.body;
          const note = await fetch(proxied(settings.proxyUrl, "https://api.hubapi.com/crm/v3/objects/notes"), { method: "POST", headers: { "Authorization": "Bearer " + settings.hubspotToken, "content-type": "application/json" }, body: JSON.stringify({ properties: { hs_note_body: noteBody, hs_timestamp: Date.now() }, associations: cid ? [{ to: { id: cid }, types: [{ associationCategory: "HUBSPOT_DEFINED", associationTypeId: 202 }] }] : [] }) });
          if (note.ok) ok++;
        } catch (e) {}
      }
      logAudit("HubSpot push", ok + " notes logged on contact records", []);
      flash(ok + " logged to HubSpot as notes awaiting send.");
    } catch (e) { flash("HubSpot push failed. " + (e.message || "")); }
    finally { setPushing(false); }
  };
  return (
    <div>
      <p className="lead">Every approved message collects here with its signature. Nothing sends on its own. {cloudOn ? "Approved messages are saved to your private gist and load whenever you open this on any device, with the time of the last save." : "Connect cloud save in Settings to keep these across devices."}</p>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 8 }}>
        <button className="btn primary" disabled={!approved.length} onClick={onDownload}>Download CSV</button>
        <button className="btn" disabled={!approved.length || pushing} onClick={pushToHubSpot}>{pushing ? <span><span className="spin" />Pushing</span> : "Push to HubSpot"}</button>
        {cloudOn ? <button className="btn" disabled={!approved.length} onClick={onSync}>Save to cloud now</button> : null}
        {approved.length ? <button className="btn" onClick={() => { if (confirm("Clear the on screen list? The cloud copy stays until the next save.")) setApproved([]); }}>Clear list</button> : null}
      </div>
      {cloud && cloud.lastSync ? <p className="tiny" style={{ margin: "0 0 16px" }}>Last cloud save, {cloud.lastSync}.</p> : <div style={{ height: 8 }} />}
      {!approved.length ? <div className="empty">Nothing approved yet. Approve a draft on the Outreach tab and it lands here.</div> : approved.map(a => (
        <div className="card" key={a.id}>
          <div className="cap" style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap", fontWeight: 400 }}>
            <strong style={{ fontSize: 14 }}>{a.name}</strong><span className="tiny">{a.channel}, signed by {a.signedBy}, approved {a.approvedAt}</span>
            <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
              <button className="btn sm" onClick={() => onCopy((a.subject ? "Subject: " + a.subject + "\n\n" : "") + a.body, "Copied")}>Copy</button>
              <button className="btn sm" onClick={() => setApproved(prev => prev.filter(x => x.id !== a.id))}>Remove</button>
            </div>
          </div>
          <div className="body">{a.subject ? <p className="subject" style={{ marginBottom: 8 }}>{a.subject}</p> : null}<p className="text">{a.body}</p></div>
        </div>
      ))}
    </div>
  );
}

/* ---------------- Settings ---------------- */
function SettingsView({ settings, setSettings, direction, setDirection, audit, setAudit }) {
  const set = (patch) => setSettings(prev => ({ ...prev, ...patch }));
  const chip = (ok, yes, no) => <span className={"pill " + (ok ? "ok" : "warn")} style={{ marginLeft: 6 }}>{ok ? yes : no}</span>;
  return (
    <div>
      <p className="lead">The studio runs from this page. Keys, edits, contacts and approvals live in this browser. The only data that leaves is what you send to the model, the audit, HubSpot or your own private gist, on the calls you trigger.</p>

      <div className="card"><div className="cap">Connections detected</div><div className="body">
        <div style={{ display: "flex", flexWrap: "wrap", gap: 14, alignItems: "center", fontSize: 13.5 }}>
          <span>Anthropic key{chip(!!settings.apiKey, "detected", "missing")}</span>
          <span>Proxy address{chip(!!settings.proxyUrl, "set", "missing")}</span>
          <span>People Data Labs key{chip(!!settings.pdlKey, "detected", "missing")}</span>
          <span>Verify with PDL{chip(!!(settings.proxyUrl && settings.pdlKey), "ready", "needs proxy and key")}</span>
        </div>
        <p className="note" style={{ margin: "12px 0 0" }}>Verify and research and Draft outreach need the Anthropic key only. Verify with PDL needs both a proxy address and a People Data Labs key, because People Data Labs does not accept calls straight from a web page. If a key you just pasted still shows as missing, click into the field, paste again and press the space bar once then delete it, so the field registers the value. If it still shows missing after a page reload, your browser may be blocking local storage, which happens in private windows.</p>
      </div></div>

      <div className="card"><div className="cap">Model</div><div className="body">
        <label className="lab">Anthropic API key, required</label>
        <input className="f" type="password" placeholder="sk-ant-..." value={settings.apiKey} onChange={e => set({ apiKey: e.target.value.trim() })} onInput={e => set({ apiKey: e.target.value.trim() })} />
        <p className="note" style={{ margin: "6px 0 16px" }}>Used to research, draft, edit and audit. Get one at <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noreferrer">console.anthropic.com</a>.</p>
        <div className="grid2">
          <div><label className="lab">Model</label><select className="f" value={settings.model} onChange={e => set({ model: e.target.value })}>{MODELS.map(m => <option key={m.id} value={m.id}>{m.label}</option>)}</select></div>
          <div><label className="lab">Default signer</label><select className="f" value={settings.signer} onChange={e => set({ signer: Number(e.target.value) })}>{SIGNERS.map((s, i) => <option key={i} value={i}>{s.name}, {s.title}</option>)}</select></div>
        </div>
      </div></div>

      <div className="card"><div className="cap">Cloud save for approved emails</div><div className="body">
        <p className="note" style={{ margin: "0 0 10px" }}>Approved emails are saved to a private GitHub gist, so they load with the time of the last save whenever you open this on any device. Create a token with the gist permission at <a href="https://github.com/settings/tokens" target="_blank" rel="noreferrer">github.com settings tokens</a>. The gist is created on your first approval.</p>
        <div className="grid2">
          <div><label className="lab">GitHub token, gist permission</label><input className="f" type="password" placeholder="ghp_..." value={settings.githubToken} onChange={e => set({ githubToken: e.target.value.trim() })} /></div>
          <div><label className="lab">Gist id, filled in automatically</label><input className="f" value={settings.gistId} onChange={e => set({ gistId: e.target.value.trim() })} placeholder="Created on first save" /></div>
        </div>
      </div></div>

      <div className="card"><div className="cap">HubSpot and the fact audit</div><div className="body">
        <p className="note" style={{ margin: "0 0 10px" }}>HubSpot and Perplexity block calls made straight from a web page, so they need a small proxy. The README has a one file Cloudflare Worker you can deploy free in two minutes. Paste its address below. Without it, contacts still import by CSV, approved emails still export by CSV, and the fact audit runs through the model.</p>
        <label className="lab">Proxy address, optional</label>
        <input className="f" style={{ marginBottom: 12 }} placeholder="https://your-worker.workers.dev" value={settings.proxyUrl} onChange={e => set({ proxyUrl: e.target.value.trim() })} onInput={e => set({ proxyUrl: e.target.value.trim() })} />
        <div className="grid2">
          <div><label className="lab">HubSpot private app token</label><input className="f" type="password" placeholder="pat-..." value={settings.hubspotToken} onChange={e => set({ hubspotToken: e.target.value.trim() })} /></div>
          <div><label className="lab">Perplexity API key, for a second audit</label><input className="f" type="password" placeholder="pplx-..." value={settings.perplexityKey} onChange={e => set({ perplexityKey: e.target.value.trim() })} /></div>
          <div><label className="lab">People Data Labs key, to verify titles and roles</label><input className="f" type="password" placeholder="pdl key" value={settings.pdlKey} onChange={e => set({ pdlKey: e.target.value.trim() })} onInput={e => set({ pdlKey: e.target.value.trim() })} /></div>
        </div>
      </div></div>

      <div className="card"><div className="cap">Standing direction</div><div className="body">
        <p className="note" style={{ margin: "0 0 8px" }}>Plain instructions that apply to every future draft. The plain English standard always applies underneath. You can also add to this from the assistant.</p>
        <textarea className="f" style={{ minHeight: 110 }} value={direction} onChange={e => setDirection(e.target.value)} placeholder="Empty. Add standing rules here, or save them from the assistant." />
      </div></div>

      <div className="card"><div className="cap" style={{ display: "flex", alignItems: "center" }}>Audit log{audit.length ? <button className="btn sm" style={{ marginLeft: "auto", fontWeight: 400 }} onClick={() => { if (confirm("Clear the audit log?")) setAudit([]); }}>Clear</button> : null}</div><div className="body">
        {!audit.length ? <p className="note" style={{ margin: 0 }}>Nothing logged yet. Research, drafting, edits, audits, approvals and saves are recorded here.</p> : audit.map((e, i) => (
          <div key={i} style={{ fontSize: 12.5, padding: "6px 0", borderBottom: i === audit.length - 1 ? "none" : "1px solid var(--hair)" }}><span className="tiny">{e.time}</span> <strong>{e.type}</strong>. {e.detail}{e.sources && e.sources.length ? <span className="tiny"> {e.sources.length} source{e.sources.length > 1 ? "s" : ""}</span> : null}</div>
        ))}
      </div></div>

      <p className="note">Contact details are personal data. Handle them under your usual data protection practice. The audit log records why a person is believed to hold the role attributed to them, which is the evidence good practice asks for.</p>
    </div>
  );
}

/* ---------------- Assistant drawer ---------------- */
function Assistant({ drawer, onClose, busy, onSend, messages, onSaveRule, onApplyEdit, keySet }) {
  const [text, setText] = useState("");
  const bodyRef = useRef(null);
  useEffect(() => { if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight; }, [messages, busy]);
  const send = () => { const t = text.trim(); if (!t || busy) return; onSend(t); setText(""); };
  return (
    <>
      <div className="scrim" onClick={onClose} />
      <div className="drawer">
        <div className="dhead"><Mark size={22} /><div><div style={{ fontSize: 13, fontWeight: 700 }}>{drawer.title}</div><div className="dscope">{drawer.scope === "global" ? "Ask about the account or set a standing instruction" : "Edit this email without leaving the page"}</div></div><button className="btn sm" style={{ marginLeft: "auto" }} onClick={onClose}>Close</button></div>
        <div className="dbody" ref={bodyRef}>
          {!messages.length ? <p className="note">{drawer.scope === "global" ? "For example, ask what is driving electrophysiology right now, or say always open emails with one short sentence and save it as a standing instruction." : "For example, make this warmer, lead on the capacity point, or shorten the second paragraph. The assistant rewrites the email and you apply it here."}</p> : null}
          {messages.map((m, i) => (
            <div key={i}>
              <div className={"msg " + (m.role === "user" ? "u" : "a")}><div className="bub">{m.text}</div></div>
              {m.role === "assistant" && m.standingRule ? (
                <div className="propose"><div className="lab2">Proposed standing instruction</div><p style={{ margin: "0 0 8px", fontSize: 13 }}>{m.standingRule}</p><button className="btn sm primary" onClick={() => onSaveRule(m.standingRule)}>Save as standing instruction</button></div>
              ) : null}
              {m.role === "assistant" && m.emailEdit ? (
                <div className="propose"><div className="lab2">Rewritten email ready</div><p style={{ margin: "0 0 8px", fontSize: 13 }}>The assistant has rewritten the email and message. Apply it to the draft.</p><button className="btn sm primary" onClick={() => onApplyEdit(m.emailEdit)}>Apply to this email</button></div>
              ) : null}
            </div>
          ))}
          {busy ? <div className="msg a"><div className="bub"><span className="spin" />Working</div></div> : null}
        </div>
        <div className="dfoot">
          {!keySet ? <p className="tiny" style={{ margin: "0 0 8px" }}>Add your Anthropic key in Settings to use the assistant.</p> : null}
          <div style={{ display: "flex", gap: 8 }}>
            <input className="f" placeholder="Type an instruction or a question" value={text} disabled={!keySet} onChange={e => setText(e.target.value)} onKeyDown={e => { if (e.key === "Enter") send(); }} />
            <button className="btn primary" disabled={busy || !keySet} onClick={send}>Send</button>
          </div>
        </div>
      </div>
    </>
  );
}

class ErrorBoundary extends React.Component {
  constructor(p) { super(p); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err }; }
  reset() {
    try { ["fb_intel", "fb_contacts", "fb_approved", "fb_audit", "fb_direction", "fb_cloud"].forEach(k => localStorage.removeItem(k)); } catch (e) {}
    location.reload();
  }
  render() {
    if (this.state.err) {
      return (
        <div style={{ maxWidth: 560, margin: "60px auto", padding: "0 24px", fontFamily: "Arial, sans-serif", color: "#1d2733" }}>
          <h2 style={{ margin: "0 0 10px", fontSize: 20 }}>The studio could not open with the saved copy in this browser</h2>
          <p style={{ lineHeight: 1.55, color: "#4a5763", margin: "0 0 18px" }}>This happens after an update, when an older saved copy in this browser no longer matches the new version. Clear that local copy and reload. Your settings are kept, and any approved emails saved to the cloud are not affected.</p>
          <button onClick={() => this.reset()} style={{ background: "#172A3A", color: "#fff", border: "none", borderRadius: 6, padding: "10px 16px", fontSize: 14, cursor: "pointer", fontFamily: "Arial, sans-serif" }}>Clear local copy and reload</button>
        </div>
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App /></ErrorBoundary>);
const boot = document.getElementById("boot"); if (boot) boot.remove();
